<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>📅 김집사 — 우리집 일정</title>
<style>
  :root {
    --bg: #f5f4fb; --card: #fff; --line: #e7e4f0; --text: #2a2440; --muted: #8a85a3;
    --primary: #7c5cff; --primary-dark: #6344e0; --danger: #e0483b; --warn: #e8920c; --ok: #1f9d57;
    --pink: #ff7eb6; --blue:#2f6fed; --shadow: 0 1px 3px rgba(40,30,80,.08), 0 4px 16px rgba(40,30,80,.06);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", "맑은 고딕", sans-serif;
    background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: 15px; }

  .modbar { display:flex; gap:5px; padding:7px 10px; background:#2a2440; overflow-x:auto; }
  .modbar a { flex:0 0 auto; text-decoration:none; color:#cbc5e8; font-weight:700; font-size:13px; padding:6px 12px; border-radius:999px; white-space:nowrap; }
  .modbar a.on { background:#7c5cff; color:#fff; }

  header { position: sticky; top: 0; z-index: 50; background: var(--card); border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 9px; padding: 11px 16px; }
  header h1 { font-size: 17px; margin: 0; font-weight: 800; }
  header .code-chip { margin-left: auto; font-size: 12px; color: var(--muted); background: var(--bg);
    border: 1px solid var(--line); padding: 4px 9px; border-radius: 999px; cursor: pointer; }

  nav.tabs { position: sticky; top: 54px; z-index: 40; display: flex; background: var(--card); border-bottom: 1px solid var(--line); }
  nav.tabs button { flex: 1; border: none; background: none; padding: 11px 2px; font-size: 13.5px;
    color: var(--muted); border-bottom: 2.5px solid transparent; font-weight: 700; }
  nav.tabs button.active { color: var(--primary); border-bottom-color: var(--primary); }

  main { padding: 14px; max-width: 760px; margin: 0 auto; padding-bottom: 92px; }

  .muted { color: var(--muted); }
  .spacer { flex: 1; }
  .btn { border: 1px solid var(--line); background: var(--card); color: var(--text); padding: 9px 14px;
    border-radius: 10px; font-size: 14px; font-weight: 700; }
  .btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
  .btn.danger { color: var(--danger); border-color: #f1c4bf; }
  .btn.sm { padding: 6px 11px; font-size: 13px; }
  .empty { text-align: center; color: var(--muted); padding: 30px 10px; font-size: 14px; }

  .cal-head { display:flex; align-items:center; justify-content:center; gap:14px; margin:4px 0 12px; }
  .cal-head .mt { font-size:18px; font-weight:800; min-width:130px; text-align:center; }
  .cal-head button { width:38px; height:38px; border-radius:50%; border:1px solid var(--line); background:var(--card); font-size:18px; font-weight:800; color:var(--primary); }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .cal-wd { text-align:center; font-size:12px; font-weight:800; color:var(--muted); padding:2px 0; }
  .cal-wd.sun { color:var(--danger); } .cal-wd.sat { color:var(--blue); }
  .cal-cell { min-height:62px; background:var(--card); border:1px solid var(--line); border-radius:9px; padding:4px 4px 3px; cursor:pointer; overflow:hidden; }
  .cal-cell.today { border-color:var(--primary); border-width:2px; }
  .cal-cell.other { background:var(--bg); opacity:.45; }
  .cal-dnum { font-size:12px; font-weight:800; }
  .cal-dnum.sun { color:var(--danger); } .cal-dnum.sat { color:var(--blue); }
  .cal-ev { font-size:10px; line-height:1.4; color:#fff; border-radius:4px; padding:0 4px; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cal-more { font-size:10px; color:var(--muted); }
  .cal-dots { display:flex; gap:3px; flex-wrap:wrap; margin-top:4px; justify-content:center; align-items:center; }
  .cal-dot2 { width:7px; height:7px; border-radius:50%; }
  .cal-hol { font-size:9px; color:#e0483b; font-weight:800; line-height:1.15; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }

  .list-card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 11px 13px;
    margin-bottom: 8px; box-shadow: var(--shadow); cursor:pointer; display:flex; align-items:center; gap:10px; }
  .ev-dot { width:12px; height:12px; border-radius:50%; flex:0 0 auto; }
  .list-card .nm { font-weight:800; }
  .list-card .sub { font-size:12.5px; color:var(--muted); margin-top:2px; }
  .cat-pill { font-size:11px; color:#fff; padding:1px 8px; border-radius:999px; font-weight:700; }
  .date-head { font-size:13px; font-weight:800; color:var(--muted); margin:14px 0 8px; }

  .fab { position: fixed; right: 18px; bottom: 18px; z-index: 60; background: var(--primary); color: #fff;
    border: none; width: 58px; height: 58px; border-radius: 50%; font-size: 30px; line-height: 1; box-shadow: 0 6px 18px rgba(124,92,255,.45); }

  .modal-bg { position: fixed; inset: 0; background: rgba(30,22,60,.45); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
  @media (min-width: 600px) { .modal-bg { align-items: center; } }
  .modal { background: var(--card); width: 100%; max-width: 480px; border-radius: 18px 18px 0 0; padding: 18px; max-height: 92vh; overflow-y: auto; }
  @media (min-width: 600px) { .modal { border-radius: 18px; } }
  .modal h2 { margin: 0 0 14px; font-size: 17px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12.5px; color: var(--muted); margin-bottom: 5px; font-weight: 700; }
  .field input, .field select, .field textarea { width: 100%; padding: 10px; border: 1px solid var(--line); border-radius: 10px; background: #fff; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }
  .cat-pick { display:flex; gap:7px; flex-wrap:wrap; }
  .cat-pick button { border:2px solid transparent; border-radius:999px; padding:7px 13px; font-size:13px; font-weight:700; color:#fff; }
  .cat-pick button.sel { outline:2px solid var(--text); outline-offset:1px; }
  .modal .actions { display: flex; gap: 8px; margin-top: 8px; }
  .modal .actions .btn { flex: 1; }

  .start-wrap { max-width: 420px; margin: 7vh auto; padding: 24px; text-align: center; }
  .start-wrap .logo { font-size: 56px; }
  .start-wrap h1 { font-size: 24px; margin: 6px 0 2px; font-weight: 800; }
  .start-wrap p { color: var(--muted); margin: 0 0 22px; font-size: 14px; }
  .start-wrap input { width: 100%; padding: 13px; border: 1px solid var(--line); border-radius: 12px; text-align: center; font-size: 16px; }
  .start-wrap .btn { width: 100%; margin-top: 10px; }
  .toast { position: fixed; bottom: 92px; left: 50%; transform: translateX(-50%); background: #2a2440; color: #fff;
    padding: 11px 20px; border-radius: 999px; font-size: 14px; z-index: 200; opacity: 0; transition: opacity .2s; pointer-events: none; font-weight: 600; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="startScreen" class="start-wrap">
  <div class="logo">📅</div>
  <h1>김집사 — 일정</h1>
  <p>가족 공유코드를 입력하세요 😺</p>
  <input id="codeInput" placeholder="예: kim-house-7392" autocomplete="off" />
  <button class="btn primary" onclick="enterSpace()">🚪 입장하기</button>
</div>

<div id="app" style="display:none">
  <div class="modbar">
    <a href="index.html">🏠 홈</a>
    <a href="butler.html">🧹 집안일</a>
    <a href="schedule.html" class="on">📅 일정</a>
    <a href="shopping.html">🛒 장보기</a>
    <a href="fines.html">💸 벌금</a>
  </div>
  <header>
    <span style="font-size:22px">📅</span>
    <h1>우리집 일정</h1>
    <span class="code-chip" id="codeChip" onclick="changeCode()" title="코드 변경"></span>
  </header>
  <nav class="tabs">
    <button data-tab="cal" class="active" onclick="switchTab('cal')">📅 달력</button>
    <button data-tab="up" onclick="switchTab('up')">📋 다가오는</button>
    <button data-tab="settings" onclick="switchTab('settings')">⚙️ 설정</button>
  </nav>
  <main>
    <div id="tab-cal"></div>
    <div id="tab-up" style="display:none"></div>
    <div id="tab-settings" style="display:none"></div>
  </main>
  <button class="fab" onclick="openEventModal(null, todayISO())" title="일정 추가">＋</button>
</div>

<div id="modalRoot"></div>
<div id="toast" class="toast"></div>

<script>
/* ===================== 분류(색상) ===================== */
const CATS = [
  { key:'공통', name:'가족 공통', color:'#7c5cff' },
  { key:'남편', name:'남편',     color:'#2f6fed' },
  { key:'아내', name:'아내',     color:'#ff7eb6' },
  { key:'아이', name:'아이',     color:'#1f9d57' },
  { key:'기념', name:'기념일',   color:'#e8920c' },
  { key:'기타', name:'기타',     color:'#8a85a3' },
];
function catOf(key){ return CATS.find(c=>c.key===key) || CATS[CATS.length-1]; }

/* ===================== 저장소 ===================== */
const Store = {
  code: null, ref: null, _ready: false, data: { events: [] },
  init(code, onReady) {
    this.code = code; this._ready = false;
    this.ref = db.ref('schedule/' + code);
    this.ref.on('value', snap => {
      const val = snap.val() || {};
      this.data = val; this.data.events ||= [];
      if (!this._ready) { this._ready = true; onReady && onReady(); } else { render(); }
    }, () => toast('연결 오류 😢 인터넷을 확인해주세요'));
    db.ref('anniversary/' + code).on('value', s => { const v = s.val(); annivItems = (v && v.items) || []; if (this._ready) render(); });
  },
  save() { if (this.ref) this.ref.set(this.data); },
  uid() { return 'e' + Math.random().toString(36).slice(2, 10); },
};

/* ===================== 유틸 ===================== */
function $(sel, root=document) { return root.querySelector(sel); }
function $all(sel, root=document) { return [...root.querySelectorAll(sel)]; }
function el(html) { const t = document.createElement('template'); t.innerHTML = html.trim(); return t.content.firstElementChild; }
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function pad(n){ return String(n).padStart(2,'0'); }
function toISO(dt){ return `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}`; }
function todayDate(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function todayISO(){ return toISO(todayDate()); }
function parseDate(s){ if(!s) return null; const [y,m,d]=s.split('-').map(Number); const dt=new Date(y,m-1,d); dt.setHours(0,0,0,0); return isNaN(dt)?null:dt; }
const WD=['일','월','화','수','목','금','토'];
const WDH=['월','화','수','목','금','토','일']; // 달력 헤더(월요일 시작)
function fmtKDate(s){ const d=parseDate(s); if(!d) return ''; return `${d.getMonth()+1}월 ${d.getDate()}일 (${WD[d.getDay()]})`; }
function fmtKFull(s){ const d=parseDate(s); if(!d) return ''; return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${WD[d.getDay()]})`; }
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('show'),1800); }
let annivItems = [];
function annivEmoji(t){ return t==='결혼기념일'?'💍':(t==='기타'?'🎉':'🎂'); }
function lunarToSolarISO(year, lm, ld){ try{ if(typeof Lunar==='undefined') return null; const s=Lunar.fromYmd(year, lm, ld).getSolar(); return `${s.getYear()}-${pad(s.getMonth())}-${pad(s.getDay())}`; }catch(e){ return null; } }
function annivTitle(a){ return `${annivEmoji(a.type)} ${a.name}${a.type==='생일'?' 생일':' '+a.type}${a.lunar?' 🌙':''}`; }
function annivOccIso(a, year){ const d=parseDate(a.date); if(!d) return null;
  if(a.lunar) return lunarToSolarISO(year, d.getMonth()+1, d.getDate()) || `${year}-${a.date.slice(5)}`;
  return `${year}-${a.date.slice(5)}`; }
function annivFor(iso){ const y=Number(iso.slice(0,4)); return annivItems.filter(a=>a.date)
  .map(a=> annivOccIso(a,y)===iso ? ({ id:'anv_'+a.id, date:iso, end:'', time:'', title:annivTitle(a), cat:'기념', isAnniv:true }) : null).filter(Boolean); }
function eventsOn(iso){ return Store.data.events.filter(e=> e.date<=iso && (e.end||e.date)>=iso ).concat(annivFor(iso)).sort((a,b)=>(a.time||'99').localeCompare(b.time||'99')); }

/* ===== 한국 공휴일 (음력 포함 + 대체공휴일) ===== */
function addDays(dt, n){ const d=new Date(dt); d.setDate(d.getDate()+n); d.setHours(0,0,0,0); return d; }
function lunarSolarDate(y, lm, ld){ const iso=lunarToSolarISO(y, lm, ld); return iso?parseDate(iso):null; }
const _holCache={};
function getHolidays(year){ if(!_holCache[year]) _holCache[year]=calcHolidays(year); return _holCache[year]; }
function calcHolidays(year){
  const map={}; const set=(d,name)=>{ map[typeof d==='string'?d:toISO(d)]=name; };
  set(`${year}-01-01`,'신정'); set(`${year}-03-01`,'삼일절'); set(`${year}-05-05`,'어린이날');
  set(`${year}-06-06`,'현충일'); set(`${year}-08-15`,'광복절'); set(`${year}-10-03`,'개천절');
  set(`${year}-10-09`,'한글날'); set(`${year}-12-25`,'크리스마스');
  const seol=lunarSolarDate(year,1,1); if(seol){ set(addDays(seol,-1),'설날'); set(seol,'설날'); set(addDays(seol,1),'설날'); }
  const chu=lunarSolarDate(year,8,15); if(chu){ set(addDays(chu,-1),'추석'); set(chu,'추석'); set(addDays(chu,1),'추석'); }
  const bud=lunarSolarDate(year,4,8); if(bud) set(bud,'부처님오신날');
  const nextFree=(dt)=>{ let nd=addDays(dt,1); while(nd.getDay()===0||nd.getDay()===6||map[toISO(nd)]) nd=addDays(nd,1); return nd; };
  if(seol && [addDays(seol,-1),seol,addDays(seol,1)].some(x=>x.getDay()===0)) set(nextFree(addDays(seol,1)),'대체공휴일');
  if(chu && [addDays(chu,-1),chu,addDays(chu,1)].some(x=>x.getDay()===0)) set(nextFree(addDays(chu,1)),'대체공휴일');
  [`${year}-03-01`,`${year}-05-05`,`${year}-08-15`,`${year}-10-03`,`${year}-10-09`,`${year}-12-25`].forEach(iso=>{ const dow=parseDate(iso).getDay(); if(dow===0||dow===6) set(nextFree(parseDate(iso)),'대체공휴일'); });
  if(bud){ const dow=bud.getDay(); if(dow===0||dow===6) set(nextFree(bud),'대체공휴일'); }
  return map;
}
function rangeLabel(e){ if(e.end && e.end!==e.date){ const a=parseDate(e.date), b=parseDate(e.end); return `${a.getMonth()+1}/${a.getDate()}~${b.getMonth()+1}/${b.getDate()}`; } return ''; }

/* ===================== 시작/코드 ===================== */
function enterSpace() {
  const code = $('#codeInput').value.trim().toLowerCase().replace(/\s+/g,'-');
  if (!code) { toast('코드를 입력해주세요 🐱'); return; }
  localStorage.setItem('kimzipsa_code', code);
  $('#startScreen').style.display='none'; $('#app').style.display='';
  $('#codeChip').textContent = '😺 ' + code;
  toast('연결 중... 📅');
  Store.init(code, () => switchTab('cal'));
}
function changeCode() {
  if (confirm('홈으로 가서 다른 코드로 바꿀까요?')) { localStorage.removeItem('kimzipsa_code'); location.href='index.html'; }
}

/* ===================== 탭 ===================== */
let currentTab = 'cal';
function switchTab(tab) {
  currentTab = tab;
  $all('nav.tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  ['cal','up','settings'].forEach(t => $('#tab-'+t).style.display=(t===tab)?'':'none');
  render();
}
function render() {
  if (currentTab === 'cal') renderCal();
  else if (currentTab === 'up') renderUp();
  else if (currentTab === 'settings') renderSettings();
}

/* ===================== 달력 ===================== */
let viewY, viewM; // 현재 보고있는 연/월(0-based)
(function initView(){ const t=todayDate(); viewY=t.getFullYear(); viewM=t.getMonth(); })();
function moveMonth(d){ viewM+=d; if(viewM<0){viewM=11;viewY--;} if(viewM>11){viewM=0;viewY++;} renderCal(); }
function renderCal() {
  const root = $('#tab-cal'); root.innerHTML = '';
  const head = el(`<div class="cal-head">
    <button id="prevM">‹</button><div class="mt">${viewY}년 ${viewM+1}월</div><button id="nextM">›</button></div>`);
  root.appendChild(head);
  $('#prevM', head).addEventListener('click', ()=>moveMonth(-1));
  $('#nextM', head).addEventListener('click', ()=>moveMonth(1));

  const grid = el(`<div class="cal-grid"></div>`);
  WDH.forEach((w,i)=> grid.appendChild(el(`<div class="cal-wd ${i===6?'sun':''} ${i===5?'sat':''}">${w}</div>`)));

  const first = new Date(viewY, viewM, 1);
  const startWd = (first.getDay()+6)%7; // 월요일 시작
  const daysInMonth = new Date(viewY, viewM+1, 0).getDate();
  const total = Math.ceil((startWd + daysInMonth)/7)*7;
  const todayStr = todayISO();
  for (let i=0; i<total; i++) {
    const dayNum = i - startWd + 1;
    const inMonth = dayNum>=1 && dayNum<=daysInMonth;
    const cellDate = new Date(viewY, viewM, dayNum);
    const iso = toISO(cellDate);
    const wd = cellDate.getDay();
    const hol = getHolidays(cellDate.getFullYear())[iso];
    const cell = el(`<div class="cal-cell ${inMonth?'':'other'} ${iso===todayStr?'today':''}"></div>`);
    cell.appendChild(el(`<div class="cal-dnum ${(wd===0||hol)?'sun':''} ${(wd===6&&!hol)?'sat':''}">${cellDate.getDate()}</div>`));
    if (hol) cell.appendChild(el(`<div class="cal-hol">${esc(hol)}</div>`));
    const evs = eventsOn(iso);
    if (evs.length) {
      const dots = el(`<div class="cal-dots"></div>`);
      evs.slice(0,4).forEach(e => dots.appendChild(el(`<span class="cal-dot2" style="background:${catOf(e.cat).color}" title="${esc(e.title)}"></span>`)));
      if (evs.length>4) dots.appendChild(el(`<span class="cal-more">+${evs.length-4}</span>`));
      cell.appendChild(dots);
    }
    cell.addEventListener('click', ()=>openDay(iso));
    grid.appendChild(cell);
  }
  root.appendChild(grid);

  // 범례
  const leg = el(`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;justify-content:center"></div>`);
  CATS.forEach(c => leg.appendChild(el(`<span style="font-size:11px;color:var(--muted)"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${c.color};margin-right:3px"></span>${c.name}</span>`)));
  root.appendChild(leg);

  // 이번 달 일정 전체 목록 (날짜칸이 좁아 제목이 잘리는 문제 보완)
  const ms = `${viewY}-${pad(viewM+1)}-01`;
  const me = `${viewY}-${pad(viewM+1)}-${pad(daysInMonth)}`;
  const monthEvents = Store.data.events.filter(e => e.date<=me && (e.end||e.date)>=ms);
  const annivMonth = annivItems.filter(a=>a.date).map(a=>{ const occ=annivOccIso(a, viewY);
    if(!occ || Number(occ.slice(5,7))!==viewM+1) return null;
    return { id:'anv_'+a.id, date:occ, title:annivTitle(a), cat:'기념', isAnniv:true }; }).filter(Boolean);
  const allMonth = monthEvents.concat(annivMonth)
    .sort((a,b)=> a.date.localeCompare(b.date) || (a.time||'99').localeCompare(b.time||'99'));
  root.appendChild(el(`<div class="date-head" style="margin-top:18px">📋 ${viewM+1}월 일정 (${allMonth.length})</div>`));
  if (!allMonth.length) root.appendChild(el(`<div class="empty" style="padding:18px">이 달 일정이 없어요 😴</div>`));
  allMonth.forEach(e => {
    const c = catOf(e.cat); const rl = rangeLabel(e); const sd = parseDate(e.date);
    const dlabel = rl ? rl : `${sd.getDate()}일(${WD[sd.getDay()]})`;
    const card = el(`<div class="list-card">
      <span class="ev-dot" style="background:${c.color}"></span>
      <div style="flex:1"><div class="nm"><span class="muted" style="font-weight:700">${dlabel}</span> ${e.time?`<span class="muted">${esc(e.time)}</span> `:''}${esc(e.title)}</div>
        <div class="sub"><span class="cat-pill" style="background:${c.color}">${esc(c.name)}</span>${e.memo?' '+esc(e.memo):''}</div></div>
    </div>`);
    card.addEventListener('click', ()=>{ if(e.isAnniv){ location.href='anniversary.html'; return; } openEventModal(e.id, e.date); });
    root.appendChild(card);
  });
}

/* ===================== 하루 보기 ===================== */
function openDay(iso) {
  const evs = eventsOn(iso);
  const hol = getHolidays(Number(iso.slice(0,4)))[iso];
  const m = el(`<div class="modal-bg"><div class="modal">
    <h2>📅 ${fmtKFull(iso)}</h2>
    ${hol?`<div style="color:#e0483b;font-weight:800;margin:-6px 0 10px">🇰🇷 ${esc(hol)}</div>`:''}
    <div id="dayList"></div>
    <div class="actions"><button class="btn primary" onclick="openEventModal(null,'${iso}')">＋ 이 날 일정 추가</button></div>
    <div style="margin-top:8px"><button class="btn" style="width:100%" onclick="closeModal()">닫기</button></div>
  </div></div>`);
  const list = $('#dayList', m);
  if (!evs.length) list.appendChild(el(`<div class="empty">이 날은 일정이 없어요 😴</div>`));
  else evs.forEach(e => {
    const c = catOf(e.cat);
    const card = el(`<div class="list-card">
      <span class="ev-dot" style="background:${c.color}"></span>
      <div style="flex:1"><div class="nm">${e.time?`<span class="muted">${esc(e.time)}</span> `:''}${esc(e.title)}</div>
        <div class="sub"><span class="cat-pill" style="background:${c.color}">${esc(c.name)}</span>${e.memo?' '+esc(e.memo):''}</div></div>
    </div>`);
    card.addEventListener('click', ()=>{ closeModal(); if(e.isAnniv){ location.href='anniversary.html'; return; } openEventModal(e.id, e.date); });
    list.appendChild(card);
  });
  showModal(m);
}

/* ===================== 다가오는 일정 ===================== */
function renderUp() {
  const root = $('#tab-up'); root.innerHTML = '';
  const today = todayISO();
  const list = Store.data.events.filter(e=>(e.end||e.date)>=today).sort((a,b)=> a.date.localeCompare(b.date) || (a.time||'99').localeCompare(b.time||'99'));
  if (!list.length) { root.appendChild(el(`<div class="empty">📋 다가오는 일정이 없어요.<br>＋ 로 추가하세요 😺</div>`)); return; }
  let lastDate = '';
  for (const e of list) {
    if (e.date !== lastDate) { root.appendChild(el(`<div class="date-head">${fmtKDate(e.date)}${e.date===today?' · 오늘':''}</div>`)); lastDate = e.date; }
    const c = catOf(e.cat); const rl = rangeLabel(e);
    const card = el(`<div class="list-card">
      <span class="ev-dot" style="background:${c.color}"></span>
      <div style="flex:1"><div class="nm">${e.time?`<span class="muted">${esc(e.time)}</span> `:''}${esc(e.title)}${rl?` <span class="muted" style="font-weight:600">📆 ${rl}</span>`:''}</div>
        <div class="sub"><span class="cat-pill" style="background:${c.color}">${esc(c.name)}</span>${e.memo?' '+esc(e.memo):''}</div></div>
    </div>`);
    card.addEventListener('click', ()=>openEventModal(e.id, e.date));
    root.appendChild(card);
  }
}

/* ===================== 일정 추가/수정 ===================== */
let _evCat = '공통';
function openEventModal(id=null, dateISO=null) {
  const ed = id ? Store.data.events.find(e=>e.id===id) : null;
  const e = ed || { date: dateISO || todayISO(), end:'', time:'', title:'', cat:'공통', memo:'' };
  _evCat = e.cat || '공통';
  const catBtns = CATS.map(c=>`<button type="button" style="background:${c.color}" class="${c.key===_evCat?'sel':''}" onclick="pickCat(this,'${c.key}')">${c.name}</button>`).join('');
  const m = el(`<div class="modal-bg"><div class="modal">
    <h2>${ed?'✏️ 일정 수정':'➕ 일정 추가'}</h2>
    <div class="field"><label>📌 제목 *</label><input id="e_title" value="${esc(e.title)}" placeholder="예: 어린이집 상담, 부모님 생신" /></div>
    <div class="field-row">
      <div class="field"><label>📅 시작 날짜</label><input id="e_date" type="date" value="${esc(e.date)}" /></div>
      <div class="field"><label>📅 종료 날짜</label><input id="e_end" type="date" value="${esc(e.end||e.date)}" /></div>
    </div>
    <div class="field"><label>🕐 시간 (선택, 여러 날이면 비워두세요)</label><input id="e_time" type="time" value="${esc(e.time)}" /></div>
    <div class="field"><label>🎨 분류</label><div class="cat-pick" id="catPick">${catBtns}</div></div>
    <div class="field"><label>📝 메모 (선택)</label><textarea id="e_memo" placeholder="예: 준비물, 장소">${esc(e.memo)}</textarea></div>
    <div class="actions">
      ${ed?`<button class="btn danger" onclick="delEvent('${id}')">🗑️ 삭제</button>`:''}
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn primary" onclick="saveEvent('${id||''}')">💾 저장</button>
    </div></div></div>`);
  showModal(m);
}
function pickCat(btn, key) { _evCat = key; $all('#catPick button').forEach(b=>b.classList.remove('sel')); btn.classList.add('sel'); }
function saveEvent(id) {
  const title = $('#e_title').value.trim();
  if (!title) { toast('제목을 입력해주세요 🐱'); return; }
  let date = $('#e_date').value || todayISO();
  let end = $('#e_end').value || date;
  if (end < date) end = date;
  const fields = { date, end, time: $('#e_time').value, title, cat: _evCat, memo: $('#e_memo').value.trim() };
  if (id) Object.assign(Store.data.events.find(e=>e.id===id), fields);
  else Store.data.events.push({ id: Store.uid(), ...fields });
  Store.save(); closeModal(); toast('💾 저장!'); render();
}
function delEvent(id) { if(confirm('이 일정을 삭제할까요?')){ Store.data.events=Store.data.events.filter(e=>e.id!==id); Store.save(); closeModal(); render(); } }

/* ===================== 설정 ===================== */
function renderSettings() {
  const root = $('#tab-settings'); root.innerHTML = '';
  const bSec = el(`<div><div class="date-head">💾 백업</div></div>`);
  const exp = el(`<button class="btn" style="margin-right:8px">⬇️ 내보내기</button>`); exp.addEventListener('click', exportBackup);
  const imp = el(`<label class="btn" style="display:inline-block">⬆️ 불러오기<input type="file" accept="application/json" style="display:none"></label>`);
  imp.querySelector('input').addEventListener('change', importBackup);
  bSec.append(exp, imp);
  root.appendChild(bSec);
  root.appendChild(el(`<div class="muted" style="margin-top:22px;font-size:12.5px">등록된 일정 ${Store.data.events.length}건 · 코드 ${esc(Store.code)}</div>`));
}
function exportBackup() {
  const blob = new Blob([JSON.stringify(Store.data, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob); const a = document.createElement('a'); const d = new Date();
  a.href = url; a.download = `일정백업_${Store.code}_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.json`;
  a.click(); URL.revokeObjectURL(url); toast('💾 백업 저장!');
}
function importBackup(ev) {
  const file = ev.target.files[0]; if (!file) return;
  if (!confirm('현재 일정을 덮어쓸까요?')) { ev.target.value=''; return; }
  const reader = new FileReader();
  reader.onload = e => { try { const d = JSON.parse(e.target.result);
    Store.data = { events: d.events||[] }; Store.save(); render(); toast('✅ 불러오기 완료');
  } catch(err){ toast('파일을 읽지 못했어요 😢'); } };
  reader.readAsText(file);
}

/* ===================== 모달 ===================== */
function showModal(node){ closeModal(); node.addEventListener('click', e=>{ if(e.target===node) closeModal(); }); $('#modalRoot').appendChild(node); }
function closeModal(){ $('#modalRoot').innerHTML=''; }

/* ===================== 부팅 ===================== */
(function boot(){
  const code = localStorage.getItem('kimzipsa_code');
  if (code) { $('#codeInput').value = code; enterSpace(); }
})();
</script>
