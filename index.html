<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🐱 김집사 — 우리집 살림 매니저</title>
<style>
  :root { --primary:#7c5cff; --muted:#8a85a3; --line:#e7e4f0; --text:#2a2440; --danger:#e0483b; --warn:#e8920c; --ok:#1f9d57; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", "맑은 고딕", sans-serif;
    background: linear-gradient(160deg, #f5f4fb 0%, #efeaff 100%); color: #2a2440; min-height: 100vh; padding: 22px 16px 40px; }
  .center { display:flex; flex-direction:column; align-items:center; }
  .logo { font-size: 60px; line-height: 1; }
  h1 { font-size: 26px; margin: 6px 0 2px; font-weight: 800; }
  .tag { color: #7c5cff; font-weight: 700; margin: 0 0 20px; }
  .wrap { width: 100%; max-width: 440px; margin: 0 auto; }

  /* 코드 입력 */
  .desc { color:#8a85a3; font-size:14px; text-align:center; margin:0 0 18px; line-height:1.6; }
  .codebox input { width:100%; padding:13px; border:1px solid #e7e4f0; border-radius:12px; text-align:center; font-size:16px; }
  .btn { width:100%; padding:13px; border-radius:12px; font-size:15px; font-weight:800; cursor:pointer; border:1px solid #e7e4f0; background:#fff; margin-top:10px; }
  .btn.primary { background:#7c5cff; border-color:#7c5cff; color:#fff; }

  /* 대시보드 */
  .dash { background:#fff; border:1px solid var(--line); border-radius:18px; padding:16px; box-shadow:0 4px 18px rgba(40,30,80,.08); margin-bottom:16px; }
  .dash h2 { margin:0 0 4px; font-size:18px; }
  .dash .day { color:var(--muted); font-size:13px; margin-bottom:12px; }
  .ds { margin-bottom:14px; }
  .ds:last-child { margin-bottom:0; }
  .ds .h { font-size:13px; font-weight:800; color:var(--muted); margin-bottom:6px; display:flex; align-items:center; gap:6px; }
  .ds .h a { margin-left:auto; font-size:12px; color:var(--primary); text-decoration:none; font-weight:700; }
  .ds-item { display:flex; align-items:center; gap:8px; padding:6px 0; border-top:1px solid #f1eef8; font-size:14px; }
  .ds-item:first-of-type { border-top:none; }
  .ds-item .pill { font-size:11px; font-weight:800; padding:2px 8px; border-radius:999px; white-space:nowrap; margin-left:auto; }
  .pill-over { background:#fbe3e0; color:var(--danger); } .pill-soon { background:#fdeccb; color:var(--warn); } .pill-ok { background:#e3f3ea; color:var(--ok); }
  .dot { width:9px;height:9px;border-radius:50%;flex:0 0 auto; }
  .ds .none { color:var(--muted); font-size:13px; }
  .allgood { text-align:center; padding:8px; color:var(--ok); font-weight:700; }
  .gauge { margin:6px 0 14px; }
  .gauge-top { display:flex; justify-content:space-between; font-size:13.5px; font-weight:800; color:var(--muted); margin-bottom:5px; }
  .gauge-track { background:#eee6fb; border-radius:999px; height:15px; overflow:hidden; }
  .gauge-fill { height:100%; border-radius:999px; transition:width .5s ease; }
  .gauge-msg { text-align:center; font-size:12.5px; font-weight:800; margin-top:6px; }
  .dash-toggle { font-size:12px; font-weight:800; color:var(--primary); background:#efeaff; border:1px solid #d9cdff; padding:5px 11px; border-radius:999px; white-space:nowrap; cursor:pointer; flex:0 0 auto; }

  .cards { display:grid; grid-template-columns:1fr 1fr; gap:11px; }
  a.card { text-decoration:none; color:inherit; background:#fff; border:1px solid #e7e4f0; border-radius:16px; padding:16px;
    box-shadow:0 4px 14px rgba(40,30,80,.07); display:flex; flex-direction:column; gap:6px; transition:transform .12s; }
  a.card:active { transform:scale(.97); }
  a.card .emoji { font-size:30px; }
  a.card .t { font-size:15px; font-weight:800; }
  a.card .b { font-size:12px; color:var(--muted); }
  a.card .badge { align-self:flex-start; font-size:11px; font-weight:800; background:#efeaff; color:var(--primary); padding:1px 8px; border-radius:999px; }
  .code-line { text-align:center; margin-top:18px; font-size:12.5px; color:var(--muted); }
  .code-line a { color:var(--primary); font-weight:700; text-decoration:none; cursor:pointer; }
  .foot { margin-top:20px; font-size:12px; color:var(--muted); text-align:center; }
  .loading { text-align:center; color:var(--muted); padding:20px; }
</style>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#7c5cff" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />

<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){})});}</script>
</head>
<body>
  <div class="center">
    <div class="logo">🐱</div>
    <h1>김집사</h1>
    <p class="tag">🏠 우리집 살림 매니저</p>
  </div>

  <div class="wrap">
    <!-- 코드 입력 -->
    <div id="codeView" style="display:none">
      <p class="desc">가족 공유코드를 입력하세요 😺<br>같은 코드를 쓰면 가족끼리 실시간으로 공유돼요</p>
      <div class="codebox">
        <input id="codeInput" placeholder="예: kim-house-7392" autocomplete="off" />
        <button class="btn primary" onclick="enter()">🚪 입장하기</button>
        <button class="btn" onclick="suggest()">✨ 새 코드 만들기</button>
      </div>
    </div>

    <!-- 대시보드 + 모듈 -->
    <div id="hubView" style="display:none">
      <div class="dash" id="dash"><div class="loading">불러오는 중... 🐱</div></div>
      <div class="cards">
        <a class="card" href="butler.html"><span class="emoji">🧹</span><span class="t">집안일</span><span class="b">청소·점검 챙기기</span><span class="badge" id="b-chore" style="display:none"></span></a>
        <a class="card" href="schedule.html"><span class="emoji">📅</span><span class="t">일정</span><span class="b">가족 공유 캘린더</span><span class="badge" id="b-sch" style="display:none"></span></a>
        <a class="card" href="shopping.html"><span class="emoji">🛒</span><span class="t">장보기</span><span class="b">실시간 공유 목록</span><span class="badge" id="b-shop" style="display:none"></span></a>
        <a class="card" href="storage.html"><span class="emoji">📦</span><span class="t">창고</span><span class="b">물품 어디 있나</span><span class="badge" id="b-stor" style="display:none"></span></a>
        <a class="card" href="vehicle.html"><span class="emoji">🚗</span><span class="t">차량</span><span class="b">충전·정비·만기</span><span class="badge" id="b-veh" style="display:none"></span></a>
        <a class="card" href="fines.html"><span class="emoji">💸</span><span class="t">벌금</span><span class="b">규칙·월별 벌금</span><span class="badge" id="b-fine" style="display:none"></span></a>
        <a class="card" href="info.html"><span class="emoji">🏠</span><span class="t">우리집 정보</span><span class="b">와이파이·계좌·사용법</span></a>
        <a class="card" href="recipe.html"><span class="emoji">🍳</span><span class="t">레시피</span><span class="b">우리집 요리 모음</span></a>
        <a class="card" href="anniversary.html"><span class="emoji">🎂</span><span class="t">기념일</span><span class="b">생일·기념일 D-day</span><span class="badge" id="b-anniv" style="display:none"></span></a>
        <a class="card" href="recurring.html"><span class="emoji">💳</span><span class="t">정기지출</span><span class="b">구독·고정비 관리</span><span class="badge" id="b-recur" style="display:none"></span></a>
        <a class="card" href="todo.html"><span class="emoji">✅</span><span class="t">할 일</span><span class="b">그때그때 할 일 트래킹</span><span class="badge" id="b-todo" style="display:none"></span></a>
        <a class="card" href="engcat.html"><span class="emoji">🐱📘</span><span class="t">EngCat</span><span class="b">영어 문장·단어 복습</span><span class="badge" id="b-eng" style="display:none"></span></a>
      </div>
      <div class="code-line">😺 우리 가족 코드: <b id="curCode"></b> · <a onclick="changeCode()">변경</a></div>
    </div>
  </div>
  <p class="foot">홈 화면에 추가하면 앱처럼 쓸 수 있어요 📲</p>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCJm4hq9g8cE9365NM5Yy670rXBUtytWW8",
    authDomain: "kimzipsa-bfe26.firebaseapp.com",
    databaseURL: "https://kimzipsa-bfe26-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "kimzipsa-bfe26", storageBucket: "kimzipsa-bfe26.firebasestorage.app",
    messagingSenderId: "99764860737", appId: "1:99764860737:web:e0450a5ef9e0954a6ad3c0"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const $ = s => document.querySelector(s);
  let dashOpen = false;   // 대시보드 기본값: 접힌 상태로 시작
  function toggleDash(){
    dashOpen = !dashOpen;
    const b=$('#dashBody'); if(b) b.style.display = dashOpen?'':'none';
    const t=$('#dashToggle'); if(t) t.textContent = dashOpen?'접기 ▴':'열기 ▾';
  }
  function get(){ return localStorage.getItem('kimzipsa_code'); }
  function suggest(){ const a=['fox','bear','owl','deer','seal','duck','cat','dog']; $('#codeInput').value=`house-${a[Math.floor(Math.random()*a.length)]}-${Math.floor(1000+Math.random()*9000)}`; }
  function enter(){ const c=$('#codeInput').value.trim().toLowerCase().replace(/\s+/g,'-'); if(!c){alert('코드를 입력해주세요 🐱');return;} localStorage.setItem('kimzipsa_code',c); show(); }
  function changeCode(){ if(confirm('다른 가족 코드로 바꿀까요? (기존 데이터는 그 코드에 그대로 보관돼요)')){ localStorage.removeItem('kimzipsa_code'); show(); } }
  function show(){
    const code=get();
    $('#codeView').style.display = code?'none':'';
    $('#hubView').style.display = code?'':'none';
    if(code){ $('#curCode').textContent=code; loadDash(code); }
    else setTimeout(()=>$('#codeInput').focus(),100);
  }

  /* ---- 날짜 유틸 ---- */
  const WD=['일','월','화','수','목','금','토'];
  function pad(n){return String(n).padStart(2,'0');}
  function today(){const d=new Date();d.setHours(0,0,0,0);return d;}
  function toISO(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
  function parseD(s){if(!s)return null;const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);dt.setHours(0,0,0,0);return isNaN(dt)?null:dt;}
  function dUntil(s){const d=parseD(s);if(!d)return null;return Math.round((d-today())/86400000);}
  function addInterval(iso,n,unit){const d=parseD(iso);if(unit==='day')d.setDate(d.getDate()+n);else if(unit==='week')d.setDate(d.getDate()+n*7);else if(unit==='month'){const day=d.getDate();d.setDate(1);d.setMonth(d.getMonth()+n);const dim=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();d.setDate(Math.min(day,dim));}else if(unit==='year')d.setFullYear(d.getFullYear()+n);return toISO(d);}

  async function loadDash(code){
    const paths=['chores','schedule','shopping','storage','vehicle','fines','anniversary','recurring','todo','english'];
    let data={};
    try {
      const snaps=await Promise.all(paths.map(p=>db.ref(p+'/'+code).once('value')));
      paths.forEach((p,i)=>data[p]=snaps[i].val()||{});
    } catch(e){ $('#dash').innerHTML='<div class="loading">연결 오류 😢 새로고침 해주세요</div>'; return; }
    renderDash(data);
  }

  function renderDash(d){
    const t=today(), todayStr=toISO(t), wd=t.getDay();
    // 집안일: 오늘 요일 해당 or interval 만기/지남
    const chores=(d.chores.tasks||[]).map(task=>{
      const r=task.recur||{}; let due=false, label='';
      if(r.type==='weekday'){ if((r.weekdays||[]).includes(wd)){due=true;label='오늘';} }
      else if(task.lastDone){ const du=dUntil(addInterval(task.lastDone,r.n,r.unit)); if(du<=0){due=true;label=du<0?`${-du}일 지남`:'오늘';} }
      return due?{name:task.name,label,over:label.includes('지남')}:null;
    }).filter(Boolean);
    // 오늘 일정
    const events=(d.schedule.events||[]).filter(e=>e.date===todayStr).sort((a,b)=>(a.time||'99').localeCompare(b.time||'99'));
    // 장보기 남은 것
    const shopTodo=(d.shopping.items||[]).filter(i=>!i.done);
    // 창고 유통기한 임박
    const expSoon=(d.storage.items||[]).map(it=>{const du=dUntil(it.expiry);return (du!==null&&du<=7)?{name:it.name,du}:null;}).filter(Boolean).sort((a,b)=>a.du-b.du);
    // 차량 만기 임박
    const veh=d.vehicle||{}; const latestOdo=cid=>{let m=0;(veh.charge||[]).filter(f=>f.carId===cid).forEach(f=>m=Math.max(m,+f.odo||0));(veh.service||[]).filter(s=>s.carId===cid).forEach(s=>m=Math.max(m,+s.odo||0));return m;};
    const vdues=(veh.reminders||[]).map(r=>{
      if(r.kind==='date'){ if(!r.dueDate)return null; const du=dUntil(r.dueDate); return du<=30?{name:r.name,label:du<0?`${-du}일 지남`:`D-${du}`,over:du<0}:null; }
      else { const rem=(+r.lastOdo||0)+(+r.intervalKm||0)-latestOdo(r.carId); return rem<=1000?{name:r.name,label:rem<=0?`${-rem}km 초과`:`${rem}km 남음`,over:rem<=0}:null; }
    }).filter(Boolean);

    const dash=$('#dash');
    const sec=(emoji,title,href,items,renderItem,emptyTxt)=>{
      let h=`<div class="ds"><div class="h">${emoji} ${title}<a href="${href}">열기 ›</a></div>`;
      if(!items.length) h+=`<div class="none">${emptyTxt}</div>`;
      else h+=items.slice(0,4).map(renderItem).join('') + (items.length>4?`<div class="none">+${items.length-4}개 더</div>`:'');
      return h+`</div>`;
    };
    const pill=(txt,over)=>`<span class="pill ${over?'pill-over':'pill-soon'}">${txt}</span>`;
    const totalAlerts=chores.length+events.length+expSoon.length+vdues.length;
    let html=`<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:6px">
      <div style="flex:1;min-width:0"><h2 style="margin:0 0 2px">오늘의 우리집 🏠</h2><div class="day" style="margin-bottom:0">${t.getFullYear()}년 ${t.getMonth()+1}월 ${t.getDate()}일 (${WD[wd]})${totalAlerts?` · 챙길 일 ${totalAlerts}건`:''}</div></div>
      <button id="dashToggle" class="dash-toggle" onclick="toggleDash()">${dashOpen?'접기 ▴':'열기 ▾'}</button>
    </div>`;
    const todoItems=(d.todo.items||[]).filter(i=>!i.done);
    const todoDue=todoItems.filter(i=>{ if(!i.due) return false; const du=Math.round((parseD(i.due)-t)/86400000); return du<=0; });
    const pending=chores.length+expSoon.length+vdues.length+todoDue.length;
    const score=pending===0?100:Math.max(30,100-pending*10);
    const gc=score>=90?'#1f9d57':(score>=60?'#e8920c':'#e0483b');
    const gm=score>=100?'완벽해요! 😻 우리집 컨디션 최고':(score>=80?'거의 완벽! 조금만 더 😺':(score>=50?'몇 가지 챙기면 좋아요 🐾':'할 일이 좀 쌓였어요 🙀'));
    html+=`<div class="gauge"><div class="gauge-top"><span>🏠 우리집 컨디션</span><span style="color:${gc}">${score}%</span></div><div class="gauge-track"><div class="gauge-fill" style="width:${score}%;background:${gc}"></div></div><div class="gauge-msg" style="color:${gc}">${gm}</div></div>`;
    html+=`<div id="dashBody" style="display:${dashOpen?'':'none'}">`;
    html+=sec('📅','오늘 일정','schedule.html',events,e=>`<div class="ds-item">${e.time?`<b>${e.time}</b>`:'<span class="dot" style="background:#7c5cff"></span>'} ${escape2(e.title)}</div>`,'오늘 일정 없음');
    html+=sec('🧹','챙길 집안일','butler.html',chores,c=>`<div class="ds-item">${escape2(c.name)}${pill(c.label,c.over)}</div>`,'오늘 할 집안일 없음 👍');
    html+=sec('🛒','장보기','shopping.html',shopTodo,i=>`<div class="ds-item">${escape2(i.name)}</div>`,'살 것 없음');
    html+=sec('⏰','유통기한 임박','storage.html',expSoon,x=>`<div class="ds-item">${escape2(x.name)}${pill(x.du<0?`${-x.du}일 지남`:`${x.du}일`,x.du<0)}</div>`,'임박 항목 없음');
    html+=sec('🚗','차량 만기','vehicle.html',vdues,v=>`<div class="ds-item">${escape2(v.name)}${pill(v.label,v.over)}</div>`,'임박 항목 없음');
    // 이번 달 벌금
    const ym=`${t.getFullYear()}-${pad(t.getMonth()+1)}`;
    const fineLogs=(d.fines.logs||[]).filter(l=>String(l.date||'').startsWith(ym));
    const fineTotal=fineLogs.reduce((s,l)=>s+(+l.amount||0),0);
    html+=`<div class="ds"><div class="h">💸 이번 달 벌금<a href="fines.html">열기 ›</a></div>`+
      (fineTotal?`<div class="ds-item"><b>합계</b><b style="margin-left:auto;color:var(--danger)">${fineTotal.toLocaleString('ko-KR')}원</b></div>`:`<div class="none">이번 달 벌금 없음 😇</div>`)+`</div>`;
    // 다가오는 기념일 (30일 내)
    const l2s=(y,lm,ld)=>{ try{ if(typeof Lunar==='undefined')return null; const s=Lunar.fromYmd(y,lm,ld).getSolar(); const dt=new Date(s.getYear(),s.getMonth()-1,s.getDay()); dt.setHours(0,0,0,0); return dt; }catch(e){return null;} };
    const anniv=(d.anniversary.items||[]).map(a=>{ const ad=parseD(a.date); if(!ad) return null;
      let nb=null;
      if(a.lunar && typeof Lunar!=='undefined'){ for(let y=t.getFullYear();y<=t.getFullYear()+2;y++){ const sd=l2s(y,ad.getMonth()+1,ad.getDate()); if(sd&&sd>=t){nb=sd;break;} } }
      if(!nb){ nb=new Date(t.getFullYear(),ad.getMonth(),ad.getDate()); nb.setHours(0,0,0,0); if(nb<t) nb=new Date(t.getFullYear()+1,ad.getMonth(),ad.getDate()); }
      const du=Math.round((nb-t)/86400000);
      return du<=30?{name:a.name,du,e:a.type==='결혼기념일'?'💍':(a.type==='기타'?'🎉':'🎂')}:null;
    }).filter(Boolean).sort((x,y)=>x.du-y.du);
    html+=sec('🎂','다가오는 기념일','anniversary.html',anniv,a=>`<div class="ds-item">${a.e} ${escape2(a.name)}${pill(a.du===0?'오늘 🎉':'D-'+a.du,a.du===0)}</div>`,'30일 내 기념일 없음');
    // 정기지출: 월 고정비 + 7일 내 결제 예정
    const recurItems=(d.recurring.items||[]).filter(i=>i.active!==false);
    const recurMonthly=recurItems.reduce((s,i)=>s+(i.cycle==='year'?(+i.amount||0)/12:(+i.amount||0)),0);
    const recurSoon=recurItems.map(i=>{ let nb;
      if(i.cycle==='year'){ const a2=String(i.mmdd||'01-01').split('-').map(Number); nb=new Date(t.getFullYear(),a2[0]-1,a2[1]); nb.setHours(0,0,0,0); if(nb<t) nb=new Date(t.getFullYear()+1,a2[0]-1,a2[1]); }
      else { const dim=new Date(t.getFullYear(),t.getMonth()+1,0).getDate(); nb=new Date(t.getFullYear(),t.getMonth(),Math.min(i.day||1,dim)); nb.setHours(0,0,0,0); if(nb<t){ const m=t.getMonth()+1; const dim2=new Date(t.getFullYear(),m+1,0).getDate(); nb=new Date(t.getFullYear(),m,Math.min(i.day||1,dim2)); } }
      const du=Math.round((nb-t)/86400000); return du<=7?{name:i.name,du,amount:+i.amount||0}:null;
    }).filter(Boolean).sort((a,b)=>a.du-b.du);
    html+=`<div class="ds"><div class="h">💳 정기지출<a href="recurring.html">열기 ›</a></div>`+
      (recurItems.length?`<div class="ds-item"><b>월 평균 고정비</b><b style="margin-left:auto;color:var(--primary)">${Math.round(recurMonthly).toLocaleString('ko-KR')}원</b></div>`+recurSoon.slice(0,3).map(r=>`<div class="ds-item">${escape2(r.name)}${pill('D-'+r.du+' · '+r.amount.toLocaleString('ko-KR')+'원',r.du<=1)}</div>`).join(''):`<div class="none">등록된 정기지출 없음</div>`)+`</div>`;
    // 할 일
    const todoSorted=todoItems.slice().sort((a,b)=>(a.due||'99999').localeCompare(b.due||'99999'));
    html+=sec('✅','할 일','todo.html',todoSorted,i=>{ const du=i.due?Math.round((parseD(i.due)-t)/86400000):null; const lbl=du!=null?(du<0?`${-du}일 지남`:(du===0?'오늘':'D-'+du)):''; return `<div class="ds-item">${escape2(i.title)}${lbl?pill(lbl,du<=0):''}</div>`; },'할 일 없음 👍');
    // EngCat 영어 복습
    const engCards=(d.english.cards||[]);
    const engDue=engCards.filter(c=>!c.srs||!c.srs.due||c.srs.due<=todayStr);
    html+=`<div class="ds"><div class="h">🐱📘 영어 복습<a href="engcat.html">열기 ›</a></div>`+
      (engCards.length?`<div class="ds-item">오늘 복습할 카드<b style="margin-left:auto;color:var(--primary)">${engDue.length}장</b></div>`:`<div class="none">카드 없음 — EngCat에서 추가</div>`)+`</div>`;
    html+=`</div>`;
    dash.innerHTML=html;

    // 카드 뱃지
    badge('b-chore',chores.length); badge('b-sch',events.length); badge('b-shop',shopTodo.length);
    badge('b-stor',expSoon.length); badge('b-veh',vdues.length); badge('b-fine',fineLogs.length); badge('b-anniv',anniv.length); badge('b-recur',recurSoon.length); badge('b-todo',todoItems.length); badge('b-eng',engDue.length);
  }
  function badge(id,n){ const e=$('#'+id); if(n>0){e.textContent=n;e.style.display='';}else e.style.display='none'; }
  function escape2(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  document.addEventListener('visibilitychange',()=>{ if(!document.hidden && get()) loadDash(get()); });
  show();
</script>
</body>
</html>
