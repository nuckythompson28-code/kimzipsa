<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🐱 김집사 — 우리집 살림 매니저</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", "맑은 고딕", sans-serif;
    background: linear-gradient(160deg, #f5f4fb 0%, #efeaff 100%); color: #2a2440;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
  .logo { font-size: 72px; line-height: 1; }
  h1 { font-size: 30px; margin: 10px 0 2px; font-weight: 800; }
  .tag { color: #7c5cff; font-weight: 700; margin: 0 0 30px; }
  .cards { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 380px; }
  a.card { text-decoration: none; color: inherit; background: #fff; border: 1px solid #e7e4f0; border-radius: 18px;
    padding: 22px; box-shadow: 0 4px 18px rgba(40,30,80,.08); display: flex; align-items: center; gap: 16px;
    transition: transform .12s, box-shadow .12s; }
  a.card:active { transform: scale(.98); }
  a.card:hover { box-shadow: 0 8px 26px rgba(40,30,80,.14); transform: translateY(-2px); }
  .card .emoji { font-size: 42px; }
  .card .t { font-size: 19px; font-weight: 800; }
  .card .d { font-size: 13.5px; color: #8a85a3; margin-top: 3px; }
  .foot { margin-top: 30px; font-size: 12.5px; color: #8a85a3; text-align: center; line-height: 1.6; }
</style>
</head>
<body>
  <div class="logo">🐱</div>
  <h1>김집사</h1>
  <p class="tag">🏠 우리집 살림 매니저</p>
  <div class="cards">
    <a class="card" href="butler.html">
      <span class="emoji">🧹</span>
      <span><div class="t">김집사 — 집안일</div>
        <div class="d">청소·점검·교체 챙기기 + 누가 했나 통계</div></span>
    </a>
    <a class="card" href="storage.html">
      <span class="emoji">📦</span>
      <span><div class="t">창고 — 재고 관리</div>
        <div class="d">팬트리·박스·선반 물품 어디 있나 찾기</div></span>
    </a>
  </div>
  <p class="foot">😺 가족끼리 같은 코드를 쓰면 실시간으로 공유돼요<br>홈 화면에 추가하면 앱처럼 쓸 수 있어요</p>
</body>
</html>
