<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>🛒 김집사 — 장보기</title>
<style>
  :root {
    --bg: #f5f4fb; --card: #fff; --line: #e7e4f0; --text: #2a2440; --muted: #8a85a3;
    --primary: #7c5cff; --primary-dark: #6344e0; --danger: #e0483b; --ok: #1f9d57; --shadow: 0 1px 3px rgba(40,30,80,.08), 0 4px 16px rgba(40,30,80,.06);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", "맑은 고딕", sans-serif;
    background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: 15px; }

  .modbar { display:flex; gap:5px; padding:7px 10px; background:#2a2440; overflow-x:auto; }
  .modbar a { flex:0 0 auto; text-decoration:none; color:#cbc5e8; font-weight:700; font-size:13px; padding:6px 12px; border-radius:999px; white-space:nowrap; }
  .modbar a.on { background:#7c5cff; color:#fff; }

  header { position: sticky; top: 0; z-index: 50; background: var(--card); border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 9px; padding: 11px 16px; }
  header h1 { font-size: 17px; margin: 0; font-weight: 800; }
  header .code-chip { margin-left: auto; font-size: 12px; color: var(--muted); background: var(--bg);
    border: 1px solid var(--line); padding: 4px 9px; border-radius: 999px; cursor: pointer; }

  main { padding: 14px; max-width: 760px; margin: 0 auto; padding-bottom: 40px; }
  .muted { color: var(--muted); }
  .btn { border: 1px solid var(--line); background: var(--card); color: var(--text); padding: 9px 14px; border-radius: 10px; font-size: 14px; font-weight: 700; }
  .btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
  .btn.sm { padding: 6px 11px; font-size: 13px; }
  .empty { text-align: center; color: var(--muted); padding: 30px 10px; font-size: 14px; }

  .addwrap { position:sticky; top:54px; z-index:30; background:var(--bg); padding:10px 0; }
  .preset { width:100%; padding:11px; border:1px solid var(--primary); border-radius:10px; background:#f3efff; color:var(--primary); font-weight:800; margin-bottom:8px; }
  .addbar { display:flex; gap:8px; }
  .addbar input { flex:1; padding:11px; border:1px solid var(--line); border-radius:10px; }
  .addbar select { padding:0 8px; border:1px solid var(--line); border-radius:10px; background:#fff; font-weight:700; }
  .addbar button { padding:0 16px; }

  .sec-title { font-size:13px; font-weight:800; color:var(--muted); margin:14px 0 8px; }
  .sh-item { display:flex; align-items:center; gap:11px; background:var(--card); border:1px solid var(--line); border-radius:11px; padding:11px 13px; margin-bottom:7px; box-shadow:var(--shadow); }
  .sh-check { width:26px; height:26px; border-radius:8px; border:2px solid var(--line); flex:0 0 auto; display:flex; align-items:center; justify-content:center; font-size:16px; color:#fff; background:#fff; }
  .sh-check.on { background:var(--ok); border-color:var(--ok); }
  .sh-item .body { flex:1; min-width:0; cursor:pointer; }
  .sh-item .nm { font-weight:700; }
  .sh-item.done .nm { text-decoration:line-through; color:var(--muted); }
  .sh-item .sub { font-size:12px; color:var(--muted); }
  .cat-emoji { font-size:18px; }

  .modal-bg { position: fixed; inset: 0; background: rgba(30,22,60,.45); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
  @media (min-width: 600px) { .modal-bg { align-items: center; } }
  .modal { background: var(--card); width: 100%; max-width: 480px; border-radius: 18px 18px 0 0; padding: 18px; }
  @media (min-width: 600px) { .modal { border-radius: 18px; } }
  .modal h2 { margin: 0 0 14px; font-size: 17px; }
  .field { margin-bottom: 12px; }
  .field label { display:block; font-size:12.5px; color:var(--muted); margin-bottom:5px; font-weight:700; }
  .field input, .field select { width:100%; padding:10px; border:1px solid var(--line); border-radius:10px; background:#fff; }
  .field-row { display:flex; gap:10px; } .field-row .field { flex:1; }
  .modal .actions { display:flex; gap:8px; margin-top:8px; } .modal .actions .btn { flex:1; }

  .start-wrap { max-width: 420px; margin: 7vh auto; padding: 24px; text-align: center; }
  .start-wrap .logo { font-size: 56px; } .start-wrap h1 { font-size: 24px; margin: 6px 0 2px; font-weight: 800; }
  .start-wrap p { color: var(--muted); margin: 0 0 22px; font-size: 14px; }
  .start-wrap input { width: 100%; padding: 13px; border: 1px solid var(--line); border-radius: 12px; text-align: center; font-size: 16px; }
  .start-wrap .btn { width: 100%; margin-top: 10px; }
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #2a2440; color: #fff;
    padding: 11px 20px; border-radius: 999px; font-size: 14px; z-index: 200; opacity: 0; transition: opacity .2s; pointer-events: none; font-weight: 600; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="startScreen" class="start-wrap">
  <div class="logo">🛒</div>
  <h1>김집사 — 장보기</h1>
  <p>가족 공유코드를 입력하세요 😺</p>
  <input id="codeInput" placeholder="예: kim-house-7392" autocomplete="off" />
  <button class="btn primary" onclick="enterSpace()">🚪 입장하기</button>
</div>

<div id="app" style="display:none">
  <div class="modbar">
    <a href="index.html">🏠 홈</a>
    <a href="butler.html">🧹 집안일</a>
    <a href="schedule.html">📅 일정</a>
    <a href="shopping.html" class="on">🛒 장보기</a>
    <a href="fines.html">💸 벌금</a>
  </div>
  <header>
    <span style="font-size:22px">🛒</span>
    <h1>장보기</h1>
    <span class="code-chip" id="codeChip" onclick="changeCode()" title="코드 변경"></span>
  </header>
  <main>
    <div class="addwrap">
      <select class="preset" id="presetSel" onchange="addPreset(this.value); this.selectedIndex=0;"></select>
      <div class="addbar">
        <select id="addCat"></select>
        <input id="addInput" placeholder="직접 입력 후 Enter" autocomplete="off" />
        <button class="btn primary" onclick="quickAdd()">추가</button>
      </div>
    </div>
    <div id="list"></div>
  </main>
</div>

<div id="modalRoot"></div>
<div id="toast" class="toast"></div>

<!-- Firebase 연결 -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCJm4hq9g8cE9365NM5Yy670rXBUtytWW8",
    authDomain: "kimzipsa-bfe26.firebaseapp.com",
    databaseURL: "https://kimzipsa-bfe26-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "kimzipsa-bfe26", storageBucket: "kimzipsa-bfe26.firebasestorage.app",
    messagingSenderId: "99764860737", appId: "1:99764860737:web:e0450a5ef9e0954a6ad3c0"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
</script>

<script>
const CATS = [
  { key:'식품', emoji:'🥦' }, { key:'생필품', emoji:'🧻' },
  { key:'주방', emoji:'🍳' }, { key:'기타', emoji:'🛍️' },
];
// 코스트코 자주 사는 것 (품목별 이모지)
const PRESET = [
  {n:'아보카도오일', e:'🥑', c:'식품'}, {n:'계란', e:'🥚', c:'식품'}, {n:'로티세리 치킨', e:'🍗', c:'식품'},
  {n:'바나나', e:'🍌', c:'식품'}, {n:'양파', e:'🧅', c:'식품'}, {n:'우유', e:'🥛', c:'식품'},
  {n:'치즈', e:'🧀', c:'식품'}, {n:'버터', e:'🧈', c:'식품'}, {n:'그릭요거트', e:'🥛', c:'식품'},
  {n:'소고기', e:'🥩', c:'식품'}, {n:'삼겹살', e:'🥓', c:'식품'}, {n:'연어', e:'🐟', c:'식품'},
  {n:'새우', e:'🦐', c:'식품'}, {n:'블루베리', e:'🫐', c:'식품'}, {n:'사과', e:'🍎', c:'식품'},
  {n:'아보카도', e:'🥑', c:'식품'}, {n:'토마토', e:'🍅', c:'식품'}, {n:'양상추', e:'🥬', c:'식품'},
  {n:'감자', e:'🥔', c:'식품'}, {n:'마늘', e:'🧄', c:'식품'}, {n:'커피 원두', e:'☕', c:'식품'},
  {n:'올리브오일', e:'🫒', c:'식품'}, {n:'쌀', e:'🍚', c:'식품'}, {n:'베이글', e:'🥯', c:'식품'},
  {n:'식빵', e:'🍞', c:'식품'}, {n:'견과류', e:'🥜', c:'식품'}, {n:'초콜릿', e:'🍫', c:'식품'},
  {n:'탄산수', e:'🥤', c:'식품'}, {n:'만두', e:'🥟', c:'식품'}, {n:'피자', e:'🍕', c:'식품'},
  {n:'식기세척기 세제', e:'🧼', c:'주방'}, {n:'주방세제', e:'🧴', c:'주방'}, {n:'키친타올', e:'🧻', c:'주방'},
  {n:'지퍼백', e:'🧊', c:'주방'}, {n:'화장지', e:'🧻', c:'생필품'}, {n:'물티슈', e:'🧖', c:'생필품'},
  {n:'세탁세제', e:'🧴', c:'생필품'}, {n:'섬유유연제', e:'🧴', c:'생필품'}, {n:'샴푸', e:'🧴', c:'생필품'},
  {n:'치약', e:'🪥', c:'생필품'}, {n:'건전지', e:'🔋', c:'기타'},
];
function presetOf(name){ return PRESET.find(p=>p.n===name); }
function emojiFor(name, cat){ const p=presetOf(name); if(p) return p.e; return (CATS.find(c=>c.key===cat)||CATS[CATS.length-1]).emoji; }

const Store = {
  code: null, ref: null, _ready: false, data: { items: [] },
  init(code, onReady) {
    this.code = code; this._ready = false;
    this.ref = db.ref('shopping/' + code);
    this.ref.on('value', snap => {
      const val = snap.val() || {}; this.data = val; this.data.items ||= [];
      if (!this._ready) { this._ready = true; onReady && onReady(); } else { render(); }
    }, () => toast('연결 오류 😢 인터넷을 확인해주세요'));
  },
  save() { if (this.ref) this.ref.set(this.data); },
  uid() { return 's' + Math.random().toString(36).slice(2, 10); },
};

function $(sel, root=document) { return root.querySelector(sel); }
function el(html) { const t = document.createElement('template'); t.innerHTML = html.trim(); return t.content.firstElementChild; }
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('show'),1600); }

function enterSpace() {
  const code = $('#codeInput').value.trim().toLowerCase().replace(/\s+/g,'-');
  if (!code) { toast('코드를 입력해주세요 🐱'); return; }
  localStorage.setItem('kimzipsa_code', code);
  $('#startScreen').style.display='none'; $('#app').style.display='';
  $('#codeChip').textContent = '😺 ' + code;
  $('#addCat').innerHTML = CATS.map(c=>`<option value="${c.key}">${c.emoji} ${c.key}</option>`).join('');
  $('#presetSel').innerHTML = `<option value="">🛒 코스트코 자주 사는 것 선택…</option>` +
    PRESET.map(p=>`<option value="${esc(p.n)}">${p.e} ${esc(p.n)}</option>`).join('');
  $('#addInput').addEventListener('keydown', e=>{ if(e.key==='Enter') quickAdd(); });
  toast('연결 중... 🛒');
  Store.init(code, () => render());
}
function changeCode() {
  if (confirm('홈으로 가서 다른 코드로 바꿀까요?')) { localStorage.removeItem('kimzipsa_code'); location.href='index.html'; }
}

function render() {
  const root = $('#list'); root.innerHTML = '';
  const todo = Store.data.items.filter(i=>!i.done);
  const done = Store.data.items.filter(i=>i.done);
  if (!Store.data.items.length) { root.appendChild(el(`<div class="empty">🛒 아직 살 것이 없어요.<br>위 드롭다운에서 고르거나 직접 입력하세요!</div>`)); return; }

  root.appendChild(el(`<div class="sec-title">🛒 살 것 (${todo.length})</div>`));
  if (!todo.length) root.appendChild(el(`<div class="muted" style="font-size:13px;margin-bottom:8px">다 담았어요! 😺</div>`));
  todo.forEach(i => root.appendChild(itemRow(i)));

  if (done.length) {
    const head = el(`<div class="sec-title" style="display:flex;align-items:center">✅ 담음 (${done.length})<span style="flex:1"></span></div>`);
    const clear = el(`<button class="btn sm">완료 비우기</button>`);
    clear.addEventListener('click', clearDone);
    head.appendChild(clear);
    root.appendChild(head);
    done.forEach(i => root.appendChild(itemRow(i)));
  }
}
function itemRow(i) {
  const row = el(`<div class="sh-item ${i.done?'done':''}"></div>`);
  const chk = el(`<div class="sh-check ${i.done?'on':''}">${i.done?'✓':''}</div>`);
  chk.addEventListener('click', ()=>toggle(i.id));
  row.appendChild(chk);
  const emo = i.emoji || emojiFor(i.name, i.cat);
  const body = el(`<div class="body"><div class="nm"><span class="cat-emoji">${emo}</span> ${esc(i.name)}</div>
    ${i.note?`<div class="sub">${esc(i.note)}</div>`:''}</div>`);
  body.addEventListener('click', ()=>openEdit(i.id));
  row.appendChild(body);
  return row;
}
function addItem(name, cat, emoji) {
  if (Store.data.items.some(i=>!i.done && i.name===name)) { toast('이미 목록에 있어요'); return; }
  Store.data.items.unshift({ id: Store.uid(), name, note:'', cat, emoji: emoji||emojiFor(name,cat), done:false, at: Date.now() });
  Store.save(); render();
}
function quickAdd() {
  const inp = $('#addInput'); const name = inp.value.trim();
  if (!name) return;
  addItem(name, $('#addCat').value, emojiFor(name, $('#addCat').value));
  inp.value=''; inp.focus();
}
function addPreset(name) {
  if (!name) return;
  const p = presetOf(name); if (!p) return;
  addItem(p.n, p.c, p.e);
  toast(`${p.e} ${p.n} 담았어요`);
}
function toggle(id) { const i = Store.data.items.find(x=>x.id===id); if(i){ i.done=!i.done; Store.save(); render(); } }
function clearDone() { if(confirm('담은(완료) 항목을 목록에서 비울까요?')){ Store.data.items = Store.data.items.filter(i=>!i.done); Store.save(); render(); } }
function openEdit(id) {
  const i = Store.data.items.find(x=>x.id===id); if(!i) return;
  const m = el(`<div class="modal-bg"><div class="modal">
    <h2>🛒 항목 수정</h2>
    <div class="field"><label>이름</label><input id="m_name" value="${esc(i.name)}" /></div>
    <div class="field-row">
      <div class="field"><label>분류</label><select id="m_cat">${CATS.map(c=>`<option value="${c.key}" ${c.key===i.cat?'selected':''}>${c.emoji} ${c.key}</option>`).join('')}</select></div>
      <div class="field"><label>수량/메모</label><input id="m_note" value="${esc(i.note)}" placeholder="예: 2개, 무염" /></div>
    </div>
    <div class="actions">
      <button class="btn" style="color:var(--danger);border-color:#f1c4bf" onclick="delItem('${id}')">🗑️ 삭제</button>
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn primary" onclick="saveEdit('${id}')">💾 저장</button>
    </div></div></div>`);
  showModal(m);
}
function saveEdit(id) {
  const i = Store.data.items.find(x=>x.id===id); if(!i) return;
  const name = $('#m_name').value.trim(); if(!name){ toast('이름을 입력해주세요'); return; }
  i.name=name; i.cat=$('#m_cat').value; i.note=$('#m_note').value.trim(); i.emoji=emojiFor(name,i.cat);
  Store.save(); closeModal(); render();
}
function delItem(id) { Store.data.items = Store.data.items.filter(i=>i.id!==id); Store.save(); closeModal(); render(); }

function showModal(node){ closeModal(); node.addEventListener('click', e=>{ if(e.target===node) closeModal(); }); $('#modalRoot').appendChild(node); }
function closeModal(){ $('#modalRoot').innerHTML=''; }

(function boot(){
  const code = localStorage.getItem('kimzipsa_code');
  if (code) { $('#codeInput').value = code; enterSpace(); }
})();
</script>
</body>
</html>
