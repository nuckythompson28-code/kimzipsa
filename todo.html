<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>✅ 김집사 — 할 일</title>
<style>
  :root { --bg:#f5f4fb; --card:#fff; --line:#e7e4f0; --text:#2a2440; --muted:#8a85a3; --primary:#7c5cff; --primary-dark:#6344e0; --danger:#e0483b; --warn:#e8920c; --ok:#1f9d57; --shadow:0 1px 3px rgba(40,30,80,.08),0 4px 16px rgba(40,30,80,.06); }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic","맑은 고딕",sans-serif; background:var(--bg); color:var(--text); font-size:15px; line-height:1.5; }
  button { font-family:inherit; cursor:pointer; } input,select,textarea { font-family:inherit; font-size:15px; }
  .modbar { display:flex; gap:5px; padding:7px 10px; background:#2a2440; overflow-x:auto; }
  .modbar a { flex:0 0 auto; text-decoration:none; color:#cbc5e8; font-weight:700; font-size:13px; padding:6px 12px; border-radius:999px; white-space:nowrap; }
  .modbar a.on { background:#7c5cff; color:#fff; }
  header { position:sticky; top:0; z-index:50; background:var(--card); border-bottom:1px solid var(--line); display:flex; align-items:center; gap:9px; padding:11px 16px; }
  header h1 { font-size:17px; margin:0; font-weight:800; }
  header .code-chip { margin-left:auto; font-size:12px; color:var(--muted); background:var(--bg); border:1px solid var(--line); padding:4px 9px; border-radius:999px; cursor:pointer; }
  main { padding:14px; max-width:760px; margin:0 auto; padding-bottom:40px; }
  .muted { color:var(--muted); }
  .btn { border:1px solid var(--line); background:var(--card); color:var(--text); padding:9px 14px; border-radius:10px; font-size:14px; font-weight:700; }
  .btn.primary { background:var(--primary); border-color:var(--primary); color:#fff; }
  .btn.sm { padding:6px 11px; font-size:13px; } .btn.danger { color:var(--danger); border-color:#f1c4bf; }
  .empty { text-align:center; color:var(--muted); padding:30px 10px; font-size:14px; }
  .addwrap { position:sticky; top:54px; z-index:30; background:var(--bg); padding:10px 0; display:flex; gap:8px; }
  .addwrap input { flex:1; padding:11px; border:1px solid var(--line); border-radius:10px; }
  .addwrap button { padding:0 16px; }
  .sec-title { font-size:13px; font-weight:800; color:var(--muted); margin:14px 0 8px; display:flex; align-items:center; }
  .td { display:flex; align-items:center; gap:11px; background:var(--card); border:1px solid var(--line); border-left:5px solid var(--line); border-radius:11px; padding:11px 13px; margin-bottom:7px; box-shadow:var(--shadow); }
  .td.over { border-left-color:var(--danger); } .td.soon { border-left-color:var(--warn); }
  .chk { width:26px; height:26px; border-radius:8px; border:2px solid var(--line); flex:0 0 auto; display:flex; align-items:center; justify-content:center; font-size:16px; color:#fff; background:#fff; }
  .chk.on { background:var(--ok); border-color:var(--ok); }
  .td .body { flex:1; min-width:0; cursor:pointer; }
  .td .nm { font-weight:700; }
  .td.done .nm { text-decoration:line-through; color:var(--muted); }
  .td .sub { font-size:12px; color:var(--muted); margin-top:2px; }
  .dday { font-size:11px; font-weight:800; padding:2px 8px; border-radius:999px; white-space:nowrap; background:var(--bg); color:var(--muted); }
  .dday.over { background:#fbe3e0; color:var(--danger); } .dday.today { background:#fdeccb; color:var(--warn); }
  .modal-bg { position:fixed; inset:0; background:rgba(30,22,60,.45); z-index:100; display:flex; align-items:flex-end; justify-content:center; }
  @media (min-width:600px){ .modal-bg{ align-items:center; } }
  .modal { background:var(--card); width:100%; max-width:480px; border-radius:18px 18px 0 0; padding:18px; }
  @media (min-width:600px){ .modal{ border-radius:18px; } }
  .modal h2 { margin:0 0 14px; font-size:17px; }
  .field { margin-bottom:12px; }
  .field label { display:block; font-size:12.5px; color:var(--muted); margin-bottom:5px; font-weight:700; }
  .field input,.field textarea { width:100%; padding:10px; border:1px solid var(--line); border-radius:10px; background:#fff; }
  .modal .actions { display:flex; gap:8px; margin-top:8px; } .modal .actions .btn { flex:1; }
  .start-wrap { max-width:420px; margin:7vh auto; padding:24px; text-align:center; }
  .start-wrap .logo { font-size:56px; } .start-wrap h1 { font-size:24px; margin:6px 0 2px; font-weight:800; }
  .start-wrap p { color:var(--muted); margin:0 0 22px; font-size:14px; }
  .start-wrap input { width:100%; padding:13px; border:1px solid var(--line); border-radius:12px; text-align:center; font-size:16px; }
  .start-wrap .btn { width:100%; margin-top:10px; }
  .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#2a2440; color:#fff; padding:11px 20px; border-radius:999px; font-size:14px; z-index:200; opacity:0; transition:opacity .2s; pointer-events:none; font-weight:600; }
  .toast.show { opacity:1; }
</style>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#7c5cff" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="김집사" />
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){})});}</script>
</head>
<body>
<div id="startScreen" class="start-wrap">
  <div class="logo">✅</div><h1>김집사 — 할 일</h1>
  <p>가족 공유코드를 입력하세요 😺</p>
  <input id="codeInput" placeholder="예: kim-house-7392" autocomplete="off" />
  <button class="btn primary" onclick="enterSpace()">🚪 입장하기</button>
</div>
<div id="app" style="display:none">
  <div class="modbar">
    <a href="index.html">🏠 홈</a>
    <a href="butler.html">🧹 집안일</a>
    <a href="schedule.html">📅 일정</a>
    <a href="shopping.html">🛒 장보기</a>
    <a href="fines.html">💸 벌금</a>
  </div>
  <header><span style="font-size:22px">✅</span><h1>할 일</h1>
    <span class="code-chip" id="codeChip" onclick="changeCode()" title="코드 변경"></span></header>
  <main>
    <div class="addwrap">
      <input id="addInput" placeholder="할 일 입력 후 Enter (예: 요크핸들 구매 확정)" autocomplete="off" />
      <button class="btn primary" onclick="quickAdd()">추가</button>
    </div>
    <div id="list"></div>
  </main>
</div>
<div id="modalRoot"></div><div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
  const firebaseConfig = { apiKey:"AIzaSyCJm4hq9g8cE9365NM5Yy670rXBUtytWW8", authDomain:"kimzipsa-bfe26.firebaseapp.com",
    databaseURL:"https://kimzipsa-bfe26-default-rtdb.asia-southeast1.firebasedatabase.app", projectId:"kimzipsa-bfe26",
    storageBucket:"kimzipsa-bfe26.firebasestorage.app", messagingSenderId:"99764860737", appId:"1:99764860737:web:e0450a5ef9e0954a6ad3c0" };
  firebase.initializeApp(firebaseConfig); const db = firebase.database();
</script>
<script>
const Store = {
  code:null, ref:null, _ready:false, data:{ items:[] },
  init(code,onReady){ this.code=code; this._ready=false; this.ref=db.ref('todo/'+code);
    this.ref.on('value', snap=>{ const v=snap.val()||{}; this.data=v; this.data.items||=[];
      if(!this._ready){ this._ready=true; onReady&&onReady(); } else render();
    }, ()=>toast('연결 오류 😢 인터넷을 확인해주세요')); },
  save(){ if(this.ref) this.ref.set(this.data); },
  uid(){ return 'd'+Math.random().toString(36).slice(2,10); },
};
function $(s,r=document){return r.querySelector(s);}
function el(h){const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstElementChild;}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function pad(n){return String(n).padStart(2,'0');}
function todayDate(){const d=new Date();d.setHours(0,0,0,0);return d;}
function parseDate(s){if(!s)return null;const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);dt.setHours(0,0,0,0);return isNaN(dt)?null:dt;}
function dUntil(s){const d=parseDate(s);if(!d)return null;return Math.round((d-todayDate())/86400000);}
const WD=['일','월','화','수','목','금','토'];
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._tm);t._tm=setTimeout(()=>t.classList.remove('show'),1600);}

function enterSpace(){ const code=$('#codeInput').value.trim().toLowerCase().replace(/\s+/g,'-');
  if(!code){toast('코드를 입력해주세요 🐱');return;}
  localStorage.setItem('kimzipsa_code',code);
  $('#startScreen').style.display='none'; $('#app').style.display='';
  $('#codeChip').textContent='😺 '+code;
  $('#addInput').addEventListener('keydown',e=>{ if(e.key==='Enter') quickAdd(); });
  toast('연결 중... ✅'); Store.init(code, ()=>render()); }
function changeCode(){ if(confirm('홈으로 가서 다른 코드로 바꿀까요?')){ localStorage.removeItem('kimzipsa_code'); location.href='index.html'; } }

function ddBadge(due){ if(!due) return ''; const du=dUntil(due);
  const cls=du<0?'over':(du===0?'today':''); const label=du<0?`${-du}일 지남`:(du===0?'오늘':`D-${du}`);
  return `<span class="dday ${cls}">📅 ${label}</span>`; }
function render(){
  const root=$('#list'); root.innerHTML='';
  const items=Store.data.items;
  const undone=items.filter(i=>!i.done).sort((a,b)=> (a.due||'99999').localeCompare(b.due||'99999') || (b.at||0)-(a.at||0));
  const done=items.filter(i=>i.done).sort((a,b)=>(b.doneAt||0)-(a.doneAt||0));
  if(!items.length){ root.appendChild(el(`<div class="empty">✅ 할 일이 없어요.<br>위에 입력해서 추가하세요!<br><span style="font-size:12px">예: 요크핸들 구매 확정, 보험 비교, 전구 갈기</span></div>`)); return; }

  root.appendChild(el(`<div class="sec-title">📝 할 일 (${undone.length})</div>`));
  if(!undone.length) root.appendChild(el(`<div class="muted" style="font-size:13px;margin-bottom:8px">다 끝냈어요! 🎉</div>`));
  undone.forEach(i=>root.appendChild(row(i)));

  if(done.length){
    const head=el(`<div class="sec-title">✅ 완료 (${done.length})<span style="flex:1"></span></div>`);
    const clr=el(`<button class="btn sm">완료 비우기</button>`); clr.addEventListener('click',clearDone);
    head.appendChild(clr); root.appendChild(head);
    done.forEach(i=>root.appendChild(row(i)));
  }
}
function row(i){
  const du = (!i.done && i.due) ? dUntil(i.due) : null;
  const cls = du!=null ? (du<0?'over':(du<=2?'soon':'')) : '';
  const r=el(`<div class="td ${i.done?'done':cls}"></div>`);
  const chk=el(`<div class="chk ${i.done?'on':''}">${i.done?'✓':''}</div>`);
  chk.addEventListener('click',()=>toggle(i.id));
  r.appendChild(chk);
  const body=el(`<div class="body"><div class="nm">${esc(i.title)}</div>
    ${(i.due||i.memo)&&!i.done?`<div class="sub">${i.due?ddBadge(i.due):''}${i.memo?` ${esc(i.memo)}`:''}</div>`:''}</div>`);
  body.addEventListener('click',()=>openEdit(i.id));
  r.appendChild(body);
  return r;
}
function quickAdd(){ const inp=$('#addInput'); const t=inp.value.trim(); if(!t) return;
  Store.data.items.unshift({ id:Store.uid(), title:t, done:false, due:'', memo:'', at:Date.now() });
  Store.save(); inp.value=''; inp.focus(); render(); }
function toggle(id){ const i=Store.data.items.find(x=>x.id===id); if(i){ i.done=!i.done; i.doneAt=i.done?Date.now():0; Store.save(); render(); } }
function clearDone(){ if(confirm('완료한 할 일을 목록에서 비울까요?')){ Store.data.items=Store.data.items.filter(i=>!i.done); Store.save(); render(); } }
function openEdit(id){ const i=Store.data.items.find(x=>x.id===id); if(!i) return;
  const m=el(`<div class="modal-bg"><div class="modal">
    <h2>✅ 할 일 수정</h2>
    <div class="field"><label>내용</label><input id="m_title" value="${esc(i.title)}" /></div>
    <div class="field"><label>마감일 (선택)</label><input id="m_due" type="date" value="${esc(i.due)}" /></div>
    <div class="field"><label>메모 (선택)</label><textarea id="m_memo" style="min-height:54px">${esc(i.memo)}</textarea></div>
    <div class="actions">
      <button class="btn danger" onclick="del('${id}')">🗑️ 삭제</button>
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn primary" onclick="saveEdit('${id}')">💾 저장</button>
    </div></div></div>`);
  showModal(m);
}
function saveEdit(id){ const i=Store.data.items.find(x=>x.id===id); if(!i) return;
  const t=$('#m_title').value.trim(); if(!t){toast('내용을 입력해주세요');return;}
  i.title=t; i.due=$('#m_due').value; i.memo=$('#m_memo').value.trim();
  Store.save(); closeModal(); render(); }
function del(id){ Store.data.items=Store.data.items.filter(i=>i.id!==id); Store.save(); closeModal(); render(); }

function showModal(node){ closeModal(); node.addEventListener('click',e=>{ if(e.target===node) closeModal(); }); $('#modalRoot').appendChild(node); }
function closeModal(){ $('#modalRoot').innerHTML=''; }
(function boot(){ const code=localStorage.getItem('kimzipsa_code'); if(code){ $('#codeInput').value=code; enterSpace(); } })();
</script>
</body>
</html>
