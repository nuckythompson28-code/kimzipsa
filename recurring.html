<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>💳 김집사 — 정기지출</title>
<style>
  :root { --bg:#f5f4fb; --card:#fff; --line:#e7e4f0; --text:#2a2440; --muted:#8a85a3; --primary:#7c5cff; --primary-dark:#6344e0; --danger:#e0483b; --warn:#e8920c; --ok:#1f9d57; --shadow:0 1px 3px rgba(40,30,80,.08),0 4px 16px rgba(40,30,80,.06); }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic","맑은 고딕",sans-serif; background:var(--bg); color:var(--text); font-size:15px; line-height:1.5; }
  button { font-family:inherit; cursor:pointer; } input,select,textarea { font-family:inherit; font-size:15px; }
  .modbar { display:flex; gap:5px; padding:7px 10px; background:#2a2440; overflow-x:auto; }
  .modbar a { flex:0 0 auto; text-decoration:none; color:#cbc5e8; font-weight:700; font-size:13px; padding:6px 12px; border-radius:999px; white-space:nowrap; }
  .modbar a.on { background:#7c5cff; color:#fff; }
  header { position:sticky; top:0; z-index:50; background:var(--card); border-bottom:1px solid var(--line); display:flex; align-items:center; gap:9px; padding:11px 16px; }
  header h1 { font-size:17px; margin:0; font-weight:800; }
  header .code-chip { margin-left:auto; font-size:12px; color:var(--muted); background:var(--bg); border:1px solid var(--line); padding:4px 9px; border-radius:999px; cursor:pointer; }
  nav.tabs { position:sticky; top:54px; z-index:40; display:flex; background:var(--card); border-bottom:1px solid var(--line); }
  nav.tabs button { flex:1; border:none; background:none; padding:11px 2px; font-size:13.5px; color:var(--muted); border-bottom:2.5px solid transparent; font-weight:700; }
  nav.tabs button.active { color:var(--primary); border-bottom-color:var(--primary); }
  main { padding:16px; max-width:760px; margin:0 auto; padding-bottom:92px; }
  .muted { color:var(--muted); } .spacer { flex:1; }
  .btn { border:1px solid var(--line); background:var(--card); color:var(--text); padding:9px 14px; border-radius:10px; font-size:14px; font-weight:700; }
  .btn.primary { background:var(--primary); border-color:var(--primary); color:#fff; }
  .btn.sm { padding:6px 11px; font-size:13px; } .btn.danger { color:var(--danger); border-color:#f1c4bf; }
  .empty { text-align:center; color:var(--muted); padding:34px 10px; font-size:14px; }
  .sec-title { font-size:13px; font-weight:800; color:var(--muted); margin:18px 0 9px; }
  .total-card { background:linear-gradient(135deg,#8b6cff,#6344e0); color:#fff; border-radius:16px; padding:18px; text-align:center; margin-bottom:14px; box-shadow:var(--shadow); }
  .total-card .l { font-size:13px; opacity:.95; font-weight:700; }
  .total-card .n { font-size:32px; font-weight:800; margin-top:2px; }
  .total-card .sub2 { font-size:12.5px; opacity:.9; margin-top:6px; }
  .r-card { background:var(--card); border:1px solid var(--line); border-left:5px solid var(--line); border-radius:13px; padding:12px 14px; margin-bottom:8px; box-shadow:var(--shadow); display:flex; align-items:center; gap:11px; }
  .r-card.soon { border-left-color:var(--warn); } .r-card.paused { opacity:.55; }
  .r-card .ic { font-size:24px; } .r-card .info { flex:1; min-width:0; cursor:pointer; }
  .r-card .nm { font-weight:800; } .r-card .sub { font-size:12.5px; color:var(--muted); margin-top:2px; }
  .r-card .amt { font-weight:800; }
  .dday { font-size:11.5px; font-weight:800; padding:2px 8px; border-radius:999px; white-space:nowrap; background:var(--bg); color:var(--muted); }
  .dday.soon { background:#fdeccb; color:var(--warn); } .dday.today { background:#fbe3e0; color:var(--danger); }
  .modal-bg { position:fixed; inset:0; background:rgba(30,22,60,.45); z-index:100; display:flex; align-items:flex-end; justify-content:center; }
  @media (min-width:600px){ .modal-bg{ align-items:center; } }
  .modal { background:var(--card); width:100%; max-width:480px; border-radius:18px 18px 0 0; padding:18px; max-height:92vh; overflow-y:auto; }
  @media (min-width:600px){ .modal{ border-radius:18px; } }
  .modal h2 { margin:0 0 14px; font-size:17px; }
  .field { margin-bottom:12px; }
  .field label { display:block; font-size:12.5px; color:var(--muted); margin-bottom:5px; font-weight:700; }
  .field input,.field select { width:100%; padding:10px; border:1px solid var(--line); border-radius:10px; background:#fff; }
  .field-row { display:flex; gap:10px; } .field-row .field { flex:1; }
  .chk { display:flex; align-items:center; gap:8px; font-size:14px; font-weight:700; } .chk input { width:auto; }
  .modal .actions { display:flex; gap:8px; margin-top:8px; } .modal .actions .btn { flex:1; }
  .fab { position:fixed; right:18px; bottom:18px; z-index:60; background:var(--primary); color:#fff; border:none; width:58px; height:58px; border-radius:50%; font-size:30px; line-height:1; box-shadow:0 6px 18px rgba(124,92,255,.45); }
  .start-wrap { max-width:420px; margin:7vh auto; padding:24px; text-align:center; }
  .start-wrap .logo { font-size:56px; } .start-wrap h1 { font-size:24px; margin:6px 0 2px; font-weight:800; }
  .start-wrap p { color:var(--muted); margin:0 0 22px; font-size:14px; }
  .start-wrap input { width:100%; padding:13px; border:1px solid var(--line); border-radius:12px; text-align:center; font-size:16px; }
  .start-wrap .btn { width:100%; margin-top:10px; }
  .toast { position:fixed; bottom:92px; left:50%; transform:translateX(-50%); background:#2a2440; color:#fff; padding:11px 20px; border-radius:999px; font-size:14px; z-index:200; opacity:0; transition:opacity .2s; pointer-events:none; font-weight:600; }
  .toast.show { opacity:1; }
</style>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#7c5cff" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="김집사" />
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){})});}</script>
</head>
<body>
<div id="startScreen" class="start-wrap">
  <div class="logo">💳</div><h1>김집사 — 정기지출</h1>
  <p>가족 공유코드를 입력하세요 😺</p>
  <input id="codeInput" placeholder="예: kim-house-7392" autocomplete="off" />
  <button class="btn primary" onclick="enterSpace()">🚪 입장하기</button>
</div>
<div id="app" style="display:none">
  <div class="modbar">
    <a href="index.html">🏠 홈</a>
    <a href="butler.html">🧹 집안일</a>
    <a href="schedule.html">📅 일정</a>
    <a href="shopping.html">🛒 장보기</a>
    <a href="fines.html">💸 벌금</a>
  </div>
  <header><span style="font-size:22px">💳</span><h1>정기지출 · 구독</h1>
    <span class="code-chip" id="codeChip" onclick="changeCode()" title="코드 변경"></span></header>
  <nav class="tabs">
    <button data-tab="list" class="active" onclick="switchTab('list')">💳 정기지출</button>
    <button data-tab="settings" onclick="switchTab('settings')">⚙️ 설정</button>
  </nav>
  <main><div id="tab-list"></div><div id="tab-settings" style="display:none"></div></main>
  <button class="fab" id="fab" onclick="openModal()" title="추가">＋</button>
</div>
<div id="modalRoot"></div><div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
  const firebaseConfig = { apiKey:"AIzaSyCJm4hq9g8cE9365NM5Yy670rXBUtytWW8", authDomain:"kimzipsa-bfe26.firebaseapp.com",
    databaseURL:"https://kimzipsa-bfe26-default-rtdb.asia-southeast1.firebasedatabase.app", projectId:"kimzipsa-bfe26",
    storageBucket:"kimzipsa-bfe26.firebasestorage.app", messagingSenderId:"99764860737", appId:"1:99764860737:web:e0450a5ef9e0954a6ad3c0" };
  firebase.initializeApp(firebaseConfig); const db = firebase.database();
</script>
<script>
const CATS = [
  {key:'구독', e:'📺'}, {key:'주거', e:'🏠'}, {key:'공과금', e:'💡'},
  {key:'보험', e:'🛡️'}, {key:'통신', e:'📱'}, {key:'기타', e:'💳'},
];
function catE(k){ return (CATS.find(c=>c.key===k)||CATS[CATS.length-1]).e; }

const Store = {
  code:null, ref:null, _ready:false, data:{ items:[] },
  init(code,onReady){ this.code=code; this._ready=false; this.ref=db.ref('recurring/'+code);
    this.ref.on('value', snap=>{ const v=snap.val()||{}; this.data=v; this.data.items||=[];
      if(!this._ready){ this._ready=true; onReady&&onReady(); } else render();
    }, ()=>toast('연결 오류 😢 인터넷을 확인해주세요')); },
  save(){ if(this.ref) this.ref.set(this.data); },
  uid(){ return 'p'+Math.random().toString(36).slice(2,10); },
};
function $(s,r=document){return r.querySelector(s);} function $all(s,r=document){return [...r.querySelectorAll(s)];}
function el(h){const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstElementChild;}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function pad(n){return String(n).padStart(2,'0');}
function todayDate(){const d=new Date();d.setHours(0,0,0,0);return d;}
function won(n){return (Number(n)||0).toLocaleString('ko-KR')+'원';}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._tm);t._tm=setTimeout(()=>t.classList.remove('show'),1700);}
const WD=['일','월','화','수','목','금','토'];

function clampDay(y,m,day){ const dim=new Date(y,m+1,0).getDate(); return Math.min(Math.max(1,day||1),dim); }
function nextBill(it){ const t=todayDate();
  if(it.cycle==='year'){ const [mm,dd]=String(it.mmdd||'01-01').split('-').map(Number);
    let nb=new Date(t.getFullYear(), mm-1, clampDay(t.getFullYear(),mm-1,dd)); nb.setHours(0,0,0,0);
    if(nb<t) nb=new Date(t.getFullYear()+1, mm-1, clampDay(t.getFullYear()+1,mm-1,dd)); return nb; }
  // month
  let nb=new Date(t.getFullYear(), t.getMonth(), clampDay(t.getFullYear(),t.getMonth(),it.day)); nb.setHours(0,0,0,0);
  if(nb<t){ const m=t.getMonth()+1; nb=new Date(t.getFullYear(), m, clampDay(t.getFullYear(),m,it.day)); } return nb; }
function dUntil(dt){ return Math.round((dt-todayDate())/86400000); }
function monthlyEquiv(it){ const a=Number(it.amount)||0; return it.cycle==='year'? a/12 : a; }

function enterSpace(){ const code=$('#codeInput').value.trim().toLowerCase().replace(/\s+/g,'-');
  if(!code){toast('코드를 입력해주세요 🐱');return;}
  localStorage.setItem('kimzipsa_code',code);
  $('#startScreen').style.display='none'; $('#app').style.display='';
  $('#codeChip').textContent='😺 '+code; toast('연결 중... 💳');
  Store.init(code, ()=>switchTab('list')); }
function changeCode(){ if(confirm('홈으로 가서 다른 코드로 바꿀까요?')){ localStorage.removeItem('kimzipsa_code'); location.href='index.html'; } }

let currentTab='list';
function switchTab(t){ currentTab=t; $all('nav.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  ['list','settings'].forEach(x=>$('#tab-'+x).style.display=(x===t)?'':'none'); $('#fab').style.display=(t==='settings')?'none':''; render(); }
function render(){ if(currentTab==='list') renderList(); else renderSettings(); }

function renderList(){
  const root=$('#tab-list'); root.innerHTML='';
  const items=Store.data.items;
  const active=items.filter(i=>i.active!==false);
  const monthly=active.reduce((s,i)=>s+monthlyEquiv(i),0);
  root.appendChild(el(`<div class="total-card"><div class="l">💳 월 평균 고정비</div>
    <div class="n">${won(Math.round(monthly))}</div>
    <div class="sub2">연간 약 ${won(Math.round(monthly*12))} · 항목 ${active.length}개</div></div>`));

  if(!items.length){ root.appendChild(el(`<div class="empty">💳 등록된 정기지출이 없어요.<br>＋ 로 월세·관리비·구독 등을 추가하세요</div>`)); return; }

  const sorted=active.map(i=>({i,nb:nextBill(i)})).sort((a,b)=>a.nb-b.nb);
  root.appendChild(el(`<div class="sec-title">📅 결제 예정순</div>`));
  sorted.forEach(({i,nb})=>root.appendChild(card(i,nb)));

  const paused=items.filter(i=>i.active===false);
  if(paused.length){ root.appendChild(el(`<div class="sec-title">⏸️ 일시중지 (${paused.length})</div>`));
    paused.forEach(i=>root.appendChild(card(i,nextBill(i)))); }
}
function card(i, nb){
  const du=dUntil(nb);
  const ddCls = du<=0?'today':(du<=3?'soon':'');
  const ddLabel = du<0?`${-du}일 지남`:(du===0?'오늘':`D-${du}`);
  const cycleLabel = i.cycle==='year' ? `매년 ${String(i.mmdd||'').replace('-','월 ')}일` : `매월 ${i.day}일`;
  const c=el(`<div class="r-card ${i.active===false?'paused':(du<=3?'soon':'')}">
    <span class="ic">${catE(i.cat)}</span>
    <div class="info"><div class="nm">${esc(i.name)}</div>
      <div class="sub">${esc(cycleLabel)}${i.memo?` · ${esc(i.memo)}`:''}</div></div>
    <div style="text-align:right"><div class="amt">${won(i.amount)}</div>
      ${i.active===false?'<div class="dday">중지</div>':`<div class="dday ${ddCls}">${ddLabel}</div>`}</div></div>`);
  $('.info',c).addEventListener('click', ()=>openModal(i.id));
  return c;
}
function openModal(id=null){
  const ed=id?Store.data.items.find(i=>i.id===id):null;
  const it=ed||{ name:'', amount:'', cat:'구독', cycle:'month', day:25, mmdd:'01-01', memo:'', active:true };
  const m=el(`<div class="modal-bg"><div class="modal">
    <h2>${ed?'✏️ 정기지출 수정':'➕ 정기지출 추가'}</h2>
    <div class="field"><label>이름 *</label><input id="f_name" value="${esc(it.name)}" placeholder="예: 넷플릭스, 월세, 관리비, 자동차보험" /></div>
    <div class="field-row">
      <div class="field"><label>금액(원) *</label><input id="f_amount" type="number" inputmode="numeric" value="${esc(it.amount)}" placeholder="예: 13500" /></div>
      <div class="field"><label>분류</label><select id="f_cat">${CATS.map(c=>`<option value="${c.key}" ${c.key===it.cat?'selected':''}>${c.e} ${c.key}</option>`).join('')}</select></div>
    </div>
    <div class="field"><label>주기</label><select id="f_cycle" onchange="onCycle()">
      <option value="month" ${it.cycle==='month'?'selected':''}>매월</option>
      <option value="year" ${it.cycle==='year'?'selected':''}>매년</option></select></div>
    <div class="field" id="dayBox" style="${it.cycle==='year'?'display:none':''}"><label>결제일 (매월 며칠)</label><input id="f_day" type="number" inputmode="numeric" min="1" max="31" value="${it.day||25}" /></div>
    <div class="field" id="mmddBox" style="${it.cycle==='year'?'':'display:none'}"><label>결제일 (매년)</label><input id="f_mmdd" type="date" value="2026-${esc(it.mmdd||'01-01')}" /></div>
    <div class="field"><label>메모 (선택)</label><input id="f_memo" value="${esc(it.memo)}" /></div>
    <div class="field"><label class="chk"><input type="checkbox" id="f_active" ${it.active!==false?'checked':''}> 사용 중 (끄면 일시중지·합계 제외)</label></div>
    <div class="actions">${ed?`<button class="btn danger" onclick="del('${id}')">🗑️</button>`:''}
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn primary" onclick="save('${id||''}')">💾 저장</button></div>
  </div></div>`);
  showModal(m);
}
function onCycle(){ const c=$('#f_cycle').value; $('#dayBox').style.display=c==='year'?'none':''; $('#mmddBox').style.display=c==='year'?'':'none'; }
function save(id){ const name=$('#f_name').value.trim(); if(!name){toast('이름을 입력해주세요');return;}
  const amount=Number($('#f_amount').value)||0; if(!amount){toast('금액을 입력해주세요');return;}
  const cycle=$('#f_cycle').value;
  const fields={ name, amount, cat:$('#f_cat').value, cycle, memo:$('#f_memo').value.trim(), active:$('#f_active').checked };
  if(cycle==='year'){ const v=$('#f_mmdd').value; fields.mmdd = v? v.slice(5) : '01-01'; }
  else { fields.day = Math.min(31, Math.max(1, Number($('#f_day').value)||1)); }
  if(id) Object.assign(Store.data.items.find(i=>i.id===id), fields);
  else Store.data.items.push({ id:Store.uid(), ...fields });
  Store.save(); closeModal(); toast('💾 저장!'); render(); }
function del(id){ if(confirm('이 정기지출을 삭제할까요?')){ Store.data.items=Store.data.items.filter(i=>i.id!==id); Store.save(); closeModal(); render(); } }

function renderSettings(){
  const root=$('#tab-settings'); root.innerHTML='';
  // 분류별 합계
  const active=Store.data.items.filter(i=>i.active!==false);
  if(active.length){
    const byCat={}; active.forEach(i=>{ byCat[i.cat]=(byCat[i.cat]||0)+monthlyEquiv(i); });
    root.appendChild(el(`<div class="sec-title">📊 분류별 월 고정비</div>`));
    Object.entries(byCat).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{
      root.appendChild(el(`<div class="r-card"><span class="ic">${catE(k)}</span><div class="info"><div class="nm">${esc(k)}</div></div><div class="amt">${won(Math.round(v))}</div></div>`));
    });
  }
  root.appendChild(el(`<div class="sec-title" style="margin-top:20px">💾 백업</div>`));
  const exp=el(`<button class="btn" style="margin-right:8px">⬇️ 내보내기</button>`); exp.addEventListener('click',exportBackup);
  const imp=el(`<label class="btn" style="display:inline-block">⬆️ 불러오기<input type="file" accept="application/json" style="display:none"></label>`);
  imp.querySelector('input').addEventListener('change',importBackup);
  root.append(exp,imp);
  root.appendChild(el(`<div class="muted" style="margin-top:18px;font-size:12.5px">항목 ${Store.data.items.length}개 · 코드 ${esc(Store.code)}</div>`));
}
function exportBackup(){ const blob=new Blob([JSON.stringify(Store.data,null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); const d=new Date(); a.href=url; a.download=`정기지출_${Store.code}_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.json`; a.click(); URL.revokeObjectURL(url); toast('💾 백업 저장!'); }
function importBackup(ev){ const f=ev.target.files[0]; if(!f)return; if(!confirm('현재 데이터를 덮어쓸까요?')){ev.target.value='';return;}
  const r=new FileReader(); r.onload=e=>{ try{ const d=JSON.parse(e.target.result); Store.data={items:d.items||[]}; Store.save(); render(); toast('✅ 불러오기 완료'); }catch(err){ toast('파일을 읽지 못했어요 😢'); } }; r.readAsText(f); }

function showModal(node){ closeModal(); node.addEventListener('click',e=>{ if(e.target===node) closeModal(); }); $('#modalRoot').appendChild(node); }
function closeModal(){ $('#modalRoot').innerHTML=''; }
(function boot(){ const code=localStorage.getItem('kimzipsa_code'); if(code){ $('#codeInput').value=code; enterSpace(); } })();
</script>
</body>
</html>
